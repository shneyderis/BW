<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beykush Winery Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e13;color:#e4e5ea;font-family:'DM Sans',sans-serif;max-width:980px;margin:0 auto;padding:12px 16px 40px}
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}.hdr .dot{width:8px;height:8px;border-radius:50%;background:#9f1239}.hdr h1{font-size:17px;font-weight:700;letter-spacing:-.5px}.hdr .badge{font-size:9px;color:#7d8196;background:#151821;padding:2px 7px;border-radius:10px}.hdr .st{font-size:9px;margin-left:auto}
.sub{font-size:10px;color:#7d8196;margin-bottom:10px}
.tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap;align-items:center}.tab{padding:5px 11px;border-radius:5px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;background:#151821;color:#7d8196;transition:all .15s}.tab.on{background:#9f1239;color:#fff}
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.flt{padding:4px 8px;border-radius:5px;border:1px solid #232738;background:#151821;color:#e4e5ea;font-size:10px;font-family:inherit;cursor:pointer}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:10px}
.kpi{background:#151821;border-radius:7px;padding:10px 12px;border:1px solid #232738}.kpi .l{font-size:9px;color:#7d8196;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}.kpi .v{font-size:18px;font-weight:700}.kpi .s{font-size:9px;color:#7d8196;margin-top:1px}
.cc{background:#151821;border-radius:7px;padding:12px;border:1px solid #232738;margin-bottom:10px}.cc h3{font-size:10px;font-weight:600;color:#7d8196;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}@media(max-width:700px){.row{grid-template-columns:1fr}}
.tbl{width:100%;border-collapse:collapse;font-size:10px}.tbl th{text-align:left;padding:5px 3px;color:#7d8196;font-weight:500;border-bottom:1px solid #232738}.tbl td{padding:4px 3px;border-bottom:1px solid rgba(35,39,56,.3)}.tbl .r{text-align:right}.tbl .g{color:#10b981}.tbl .rd{color:#ef4444}.tbl tr.click{cursor:pointer}.tbl tr.click:hover{background:#1e2130}.tbl .tot td{font-weight:700;border-top:2px solid #232738}
.si{margin-bottom:5px;padding:7px 9px;background:#151821;border-radius:5px;border:1px solid #232738}.si.low{border-color:rgba(239,68,68,.3)}.si.stk{border-color:rgba(245,158,11,.3)}.si .top{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px}.si .nm{font-weight:600}.si .bar{height:3px;background:#232738;border-radius:2px;overflow:hidden}.si .bf{height:100%;border-radius:2px}.si .bot{display:flex;justify-content:space-between;margin-top:2px;font-size:9px;color:#7d8196}
.lgd{display:flex;gap:8px;margin-bottom:6px;font-size:9px;color:#7d8196}.lgd i{width:5px;height:5px;border-radius:2px;display:inline-block;margin-right:2px}
.mg{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #232738;font-size:11px;cursor:pointer}.mg:hover{background:#1e2130;margin:0 -4px;padding:6px 4px;border-radius:4px}.mg:last-child{border:none}.mg .n{font-weight:600}.mg .s{font-size:9px;color:#7d8196}.mg .v{font-weight:600;color:#10b981;text-align:right}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}.modal-c{background:#151821;border:1px solid #232738;border-radius:10px;padding:20px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto}.modal-c h2{font-size:15px;margin-bottom:12px}.modal-close{float:right;background:none;border:none;color:#7d8196;font-size:18px;cursor:pointer;padding:4px 8px}
.hidden{display:none}
.warn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:8px 10px;font-size:10px;color:#ef4444;margin-bottom:8px}
.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:6px;padding:8px 10px;font-size:10px;color:#3b82f6;margin-bottom:8px}
.sec{border-left:3px solid #9f1239;padding-left:10px;margin:14px 0 8px;font-size:12px;font-weight:600;color:#e4e5ea}
</style>
</head>
<body>
<div class="hdr"><div class="dot"></div><h1>BEYKUSH WINERY</h1><span class="badge">Live</span><span class="st" id="status" style="color:#f59e0b">⏳</span></div>
<div class="sub" id="subtitle">Загрузка...</div>
<div class="tabs" id="tabs">
  <button class="tab on" onclick="sw('pl',this)">P&L</button>
  <button class="tab" onclick="sw('sales',this)">Продажи</button>
  <button class="tab" onclick="sw('exp',this)">Расходы</button>
  <button class="tab" onclick="sw('assets',this)">Осн.фонды</button>
  <button class="tab" onclick="sw('shop',this)">Магазин</button>
  <button class="tab" onclick="sw('stock',this)">Склад</button>
  <button class="tab" onclick="sw('cash',this)">Кэш-фло</button>
  <button class="tab" onclick="sw('unrec',this)">⚠️</button>
  <button class="tab" onclick="sw('settings',this)">⚙</button>
</div>
<div id="filterbar" class="filters"></div>
<div id="ld"><p style="text-align:center;padding:80px 0;color:#7d8196">Загрузка данных...</p></div>
<div id="t-pl" class="hidden"></div><div id="t-sales" class="hidden"></div><div id="t-exp" class="hidden"></div><div id="t-assets" class="hidden"></div><div id="t-shop" class="hidden"></div><div id="t-stock" class="hidden"></div><div id="t-cash" class="hidden"></div><div id="t-unrec" class="hidden"></div><div id="t-settings" class="hidden"></div>
<div id="modal" class="modal hidden"></div>

<script>
const SID="1K52LGIjxaQg1LfmjdVKXA0-wMh0MVUo16q-Z6BiNOsQ";
const WC="https://beykush.com/wp-json/wc/v3";
const WCK="consumer_key=ck_5b87215529858139d17b602945170ae4d9c8adbd&consumer_secret=cs_3ad054a505185162e849a92bf019979e6c037c93";
const IGN=["#ignore","Конвертація","ІГНОР!!!","Банк???","Банк, Еквайринг"];
const ZP=["ЗП менеджерів","ЗП Виноградник","ЗП Виноробня","ЗП Готель","ЗП Цибак","BW Света","BW Наташа","BW Таня"];
const ACATS=["Обладнання виноробні","Обладнання виноградник","Обладнання, власний транспорт"];
let T=[],SK=[],BL=[],WO=[],FX={EUR:44,USD:41},CH={},SETS={fopTax:7.5,fopBank:0,dispCur:"UAH"};
function pn(s){if(!s||s==="")return 0;s=String(s).trim();let ng=false;if(s.startsWith("(")&&s.endsWith(")")){ng=true;s=s.slice(1,-1)}if(s.startsWith("-")){ng=true;s=s.slice(1)}s=s.replace(/[₴$€\s]/g,"").replace(/,/g,"");let n=parseFloat(s);return isNaN(n)?0:ng?-n:n}
const fm=n=>{if(!n&&n!==0)return"—";const a=Math.abs(n);if(a>=1e6)return(n/1e6).toFixed(1)+"M";if(a>=1e3)return(n/1e3).toFixed(0)+"K";return n.toFixed(0)};
const ff=n=>n?new Intl.NumberFormat("uk-UA",{maximumFractionDigits:0}).format(n):"0";
function gv(o,s){for(const k of Object.keys(o)){if(k.trim().toLowerCase().startsWith(s.toLowerCase()))return o[k]}return""}
function toCur(v){if(SETS.dispCur==="EUR")return v/FX.EUR;if(SETS.dispCur==="USD")return v/FX.USD;return v}
function cs(){return SETS.dispCur==="EUR"?"€":SETS.dispCur==="USD"?"$":"₴"}
async function csvF(sh){const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sh)}`);const t=await r.text();const rows=[];let c=[],q=false,f="";for(let i=0;i<t.length;i++){const x=t[i];if(q){if(x==='"'&&t[i+1]==='"'){f+='"';i++}else if(x==='"')q=false;else f+=x}else{if(x==='"')q=true;else if(x===','){c.push(f);f=""}else if(x==='\n'||(x==='\r'&&t[i+1]==='\n')){c.push(f);f="";rows.push(c);c=[];if(x==='\r')i++}else f+=x}}if(f||c.length){c.push(f);rows.push(c)}if(rows.length<2)return[];const h=rows[0].map(x=>x.trim());return rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>{o[k]=r[i]!==undefined?r[i].trim():""});return o})}
async function wcF(ep,p=""){let all=[],pg=1;while(pg<=10){try{const r=await fetch(`${WC}/${ep}?${WCK}&per_page=100&page=${pg}&${p}`);if(!r.ok)break;const d=await r.json();if(!d.length)break;all=all.concat(d);if(d.length<100)break;pg++}catch(e){break}}return all}
async function nbuF(){try{const r=await fetch("https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json");const d=await r.json();const e=d.find(x=>x.cc==="EUR"),u=d.find(x=>x.cc==="USD");if(e)FX.EUR=e.rate;if(u)FX.USD=u.rate}catch(e){}}
function net(t){
  if(t.tp==="Доход"&&(t.src==="PRIVAT"||t.src==="VOSTOK")&&t.cat!=="Продаж, Експорт")return t.amt/1.2;
  if(t.tp==="Расход"&&(t.src==="PRIVAT"||t.src==="VOSTOK")&&!ZP.some(z=>t.cat.includes(z))&&!t.cat.includes("Податки")&&!t.cat.includes("Банківська"))return t.amt/1.2;
  return t.amt;
}
function isA(t){return ACATS.some(a=>t.cat.includes(a))}
function sT(t){return(t.src==="2fMK"||t.src==="2fKiev")?"2Ф":"1Ф"}

async function load(){
  try{
    await nbuF();
    const[t,s,b]=await Promise.all([csvF("Dashboard_Data"),csvF("3_Stock"),csvF("6_Balances")]);
    T=t.map(x=>{const mo=String(pn(gv(x,"month"))||gv(x,"month")||"");return{mo,money:gv(x,"money")||"",name:gv(x,"name")||"",alias:gv(x,"alias")||"",cat:gv(x,"category")||"",geo:gv(x,"geo")||"",mgr:gv(x,"менеджер")||gv(x,"manager")||"",amt:pn(gv(x,"sum_uah")),com:pn(gv(x,"commission")),sm:pn(gv(x,"sum_money")),src:gv(x,"source")||""}}).filter(x=>{const m=parseInt(x.mo);return m>=202001&&!IGN.includes(x.cat)&&x.cat!==""});
    T.forEach(x=>{x.yr=x.mo.substring(0,4);x.mm=x.mo.substring(4,6);x.ym=x.yr+"-"+x.mm;x.tp=x.amt>0?"Доход":"Расход";x.nt=net(x);x.st=sT(x)});
    SK=s;BL=b;
    try{WO=await wcF("orders","status=completed,processing")}catch(e){WO=[]}
    const yrs=[...new Set(T.map(x=>x.yr))].filter(y=>y>="2020").sort();
    const lastTxn=T.length?T.reduce((a,b)=>a.mo>b.mo?a:b).ym:"?";
    document.getElementById("status").textContent="● Connected";document.getElementById("status").style.color="#10b981";
    document.getElementById("subtitle").textContent=ff(T.length)+" опер · "+WO.length+" WC заказов · до "+lastTxn+" · €"+FX.EUR.toFixed(2)+" $"+FX.USD.toFixed(2);
    document.getElementById("ld").classList.add("hidden");
    bldFlt(yrs);render();
  }catch(e){document.getElementById("status").textContent="● Err";document.getElementById("status").style.color="#ef4444";document.getElementById("ld").innerHTML='<p style="color:#ef4444;text-align:center;padding:60px">'+e.message+'</p>'}
}

function bldFlt(yrs){
  const fb=document.getElementById("filterbar");
  const geos=[...new Set(T.filter(t=>t.geo&&t.geo!=="="&&t.geo!=="-").map(t=>t.geo))].sort();
  const chs=[...new Set(T.filter(t=>t.tp==="Доход").map(t=>t.cat))].sort();
  fb.innerHTML=`
    <select class="flt" id="fY"><option value="ALL">Все годы</option>${yrs.map(y=>'<option>'+y+'</option>').join("")}</select>
    <select class="flt" id="fM"><option value="ALL">Все мес</option>${["01","02","03","04","05","06","07","08","09","10","11","12"].map(m=>'<option>'+m+'</option>').join("")}</select>
    <select class="flt" id="fS"><option value="ALL">1Ф+2Ф</option><option>1Ф</option><option>2Ф</option></select>
    <select class="flt" id="fC"><option value="ALL">Все каналы</option>${chs.map(c=>'<option value="'+c+'">'+(c.length>22?c.substring(0,22)+"…":c)+'</option>').join("")}</select>
    <select class="flt" id="fG"><option value="ALL">Все гео</option>${geos.map(g=>'<option>'+g+'</option>').join("")}</select>
    <select class="flt" id="fCur"><option value="UAH">₴</option><option value="EUR">€</option><option value="USD">$</option></select>`;
  ["fY","fM","fS","fC","fG","fCur"].forEach(id=>document.getElementById(id).onchange=()=>{if(id==="fCur")SETS.dispCur=document.getElementById("fCur").value;render()});
}
function gF(){return{yr:document.getElementById("fY")?.value||"ALL",mm:document.getElementById("fM")?.value||"ALL",src:document.getElementById("fS")?.value||"ALL",chan:document.getElementById("fC")?.value||"ALL",geo:document.getElementById("fG")?.value||"ALL"}}
function fl(list,f,tp){let r=list;if(f.yr!=="ALL")r=r.filter(t=>t.yr===f.yr);if(f.mm!=="ALL")r=r.filter(t=>t.mm===f.mm);if(f.src!=="ALL")r=r.filter(t=>t.st===f.src);if(f.chan!=="ALL")r=r.filter(t=>t.cat===f.chan);if(f.geo!=="ALL")r=r.filter(t=>t.geo===f.geo);if(tp)r=r.filter(t=>t.tp===tp);return r}
function sw(id,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');['pl','sales','exp','assets','shop','stock','cash','unrec','settings'].forEach(t=>document.getElementById('t-'+t).classList.add('hidden'));document.getElementById('t-'+id).classList.remove('hidden');render()}
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id]}}
const CHS=["Продаж, Мережі","Продаж, Horeca & Shops","Продаж, Експорт","Доход, ФОП","Продаж, Корп клієнт","Доход, каса БВ","Продаж,  Дістрібʼютор Укр","Продаж, Інтернет магазини","Продаж, на виноробні"];
const CSH={"Продаж, Мережі":"Сети","Продаж, Horeca & Shops":"HoReCa","Продаж, Експорт":"Экспорт","Доход, ФОП":"ФОП","Продаж, Корп клієнт":"Корп","Доход, каса БВ":"Каса","Продаж,  Дістрібʼютор Укр":"Дистр","Продаж, Інтернет магазини":"Инет","Продаж, на виноробні":"Виноробня"};
const CC=["#e11d48","#8b5cf6","#10b981","#f59e0b","#3b82f6","#ec4899","#14b8a6","#6366f1","#a855f7"];
const MN=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];const MMa=["01","02","03","04","05","06","07","08","09","10","11","12"];
const COB={responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9,padding:6}}},scales:{x:{ticks:{color:"#7d8196",font:{size:9}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}};
function aY(){return[...new Set(T.map(x=>x.yr))].sort()}
function sY(f){return f.yr!=="ALL"?f.yr:aY().pop()||"2026"}
function pYr(y){return String(parseInt(y)-1)}
function mxMM(y){const ms=T.filter(t=>t.yr===y).map(t=>parseInt(t.mm));return ms.length?Math.max(...ms):12}

function render(){const f=gF();rPL(f);rSales(f);rExp(f);rAssets(f);rShop(f);rStock();rCash(f);rUnrec();rSettings()}

// ========== P&L ==========
function rPL(f){
  const el=document.getElementById("t-pl"),sy=sY(f),py=pYr(sy),mm=mxMM(sy),c$=cs();
  const opex=T.filter(t=>!isA(t));
  const yearSelected=f.yr!=="ALL";
  const monthSelected=f.mm!=="ALL";
  
  // KPIs
  const sr=opex.filter(t=>t.yr===sy&&t.tp==="Доход").reduce((s,t)=>s+t.nt,0);
  const se=opex.filter(t=>t.yr===sy&&t.tp==="Расход").reduce((s,t)=>s+t.nt,0);
  const assetY=T.filter(t=>isA(t)&&t.yr===sy&&t.tp==="Расход").reduce((s,t)=>s+Math.abs(t.nt),0);
  const sp=sr+se,sm=sr?(sp/sr*100).toFixed(1):"0";
  const pr=opex.filter(t=>t.yr===py&&parseInt(t.mm)<=mm&&t.tp==="Доход").reduce((s,t)=>s+t.nt,0);
  const gr=pr?((sr-pr)/pr*100).toFixed(1):"0";const ytd=mm<12?" →"+MN[mm-1]:"";
  // Balance
  const uahB=pn(gv(BL.find(b=>gv(b,"валют")==="UAH")||{},"баланс")||"0");
  const eurB=pn(gv(BL.find(b=>gv(b,"валют")==="EUR")||{},"баланс")||"0");
  const usdB=pn(gv(BL.find(b=>gv(b,"валют")==="USD")||{},"баланс")||"0");
  const totalB=uahB+eurB*FX.EUR+usdB*FX.USD;

  let chartHTML="",detailHTML="";
  
  if(!yearSelected){
    // === ALL YEARS: bar chart by year ===
    const yrs=aY();
    const bd=yrs.map(y=>{const ox=opex.filter(t=>t.yr===y);const r=ox.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.nt,0);const e=ox.filter(t=>t.tp==="Расход").reduce((s,t)=>s+t.nt,0);const a=T.filter(t=>isA(t)&&t.yr===y&&t.tp==="Расход").reduce((s,t)=>s+Math.abs(t.nt),0);return{y,r:toCur(r),e:toCur(Math.abs(e)),p:toCur(r+e),a:toCur(a),m:r?((r+e)/r*100):0}});
    chartHTML=`<div class="row"><div class="cc"><h3>P&L по годам (без осн.фондов)</h3><canvas id="c1" height="150"></canvas></div><div class="cc"><h3>Маржинальность %</h3><canvas id="c1m" height="150"></canvas></div></div>`;
    detailHTML=`<div class="cc"><h3>Сводная таблица</h3><table class="tbl"><tr><th></th>${yrs.map(y=>'<th class="r">'+y+'</th>').join("")}<th class="r">Итого</th></tr>
      <tr><td>Выручка нетто</td>${bd.map(d=>'<td class="r g">'+fm(d.r)+'</td>').join("")}<td class="r g">${fm(bd.reduce((s,d)=>s+d.r,0))}</td></tr>
      <tr><td>OPEX</td>${bd.map(d=>'<td class="r rd">'+fm(d.e)+'</td>').join("")}<td class="r rd">${fm(bd.reduce((s,d)=>s+d.e,0))}</td></tr>
      <tr><td>Осн.фонды</td>${bd.map(d=>'<td class="r" style="color:#3b82f6">'+fm(d.a)+'</td>').join("")}<td class="r" style="color:#3b82f6">${fm(bd.reduce((s,d)=>s+d.a,0))}</td></tr>
      <tr class="tot"><td>Прибыль</td>${bd.map(d=>'<td class="r '+(d.p>0?"g":"rd")+'">'+fm(d.p)+'</td>').join("")}<td class="r">${fm(bd.reduce((s,d)=>s+d.p,0))}</td></tr>
      <tr><td>Маржа</td>${bd.map(d=>'<td class="r">'+d.m.toFixed(1)+'%</td>').join("")}<td class="r"></td></tr></table></div>`;
  } else if(yearSelected && !monthSelected){
    // === YEAR SELECTED: monthly bars with prev year overlay ===
    const ms1={},ms2={},me1={},me2={},ma1={};
    opex.filter(t=>t.yr===sy&&t.tp==="Доход").forEach(t=>{ms1[t.mm]=(ms1[t.mm]||0)+toCur(t.nt)});
    opex.filter(t=>t.yr===py&&t.tp==="Доход").forEach(t=>{ms2[t.mm]=(ms2[t.mm]||0)+toCur(t.nt)});
    opex.filter(t=>t.yr===sy&&t.tp==="Расход").forEach(t=>{me1[t.mm]=(me1[t.mm]||0)+toCur(Math.abs(t.nt))});
    opex.filter(t=>t.yr===py&&t.tp==="Расход").forEach(t=>{me2[t.mm]=(me2[t.mm]||0)+toCur(Math.abs(t.nt))});
    T.filter(t=>isA(t)&&t.yr===sy&&t.tp==="Расход").forEach(t=>{ma1[t.mm]=(ma1[t.mm]||0)+toCur(Math.abs(t.nt))});
    chartHTML=`<div class="cc"><h3>Выручка помесячно ${sy} vs ${py}</h3><canvas id="c2r" height="90"></canvas></div>
      <div class="cc"><h3>Расходы помесячно ${sy} vs ${py} + осн.фонды</h3><canvas id="c2e" height="90"></canvas></div>`;
    // Detail: revenue by channel

    <div class="kpis"><div class="kpi"><div class="l">Всего инвестиций</div><div class="v" style="color:#3b82f6">${ff(total)}${c$}</div></div>${ACATS.map(c=>'<div class="kpi"><div class="l">'+c.replace("Обладнання ","").replace(", власний транспорт","транспорт")+'</div><div class="v">'+ff(toCur(Math.abs(ft.filter(t=>t.cat.includes(c)).reduce((s,t)=>s+t.nt,0))))+c$+'</div></div>').join("")}</div>
    <div class="cc"><h3>Инвестиции по годам</h3><canvas id="ca1" height="130"></canvas></div>`;
  dc("ca1");CH.ca1=new Chart(document.getElementById("ca1"),{type:"bar",data:{labels:yrs,datasets:ACATS.map((c,i)=>({label:c.replace("Обладнання ",""),data:yrs.map(y=>toCur(Math.abs(ft.filter(t=>t.yr===y&&t.cat.includes(c)).reduce((s,t)=>s+t.nt,0)))),backgroundColor:CC[i+3],borderRadius:2}))},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{stacked:true,ticks:{color:"#7d8196"},grid:{color:"#1e2130"}},y:{stacked:true,ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
}

// ========== SHOP ==========
function rShop(f){
  const el=document.getElementById("t-shop"),c$=cs();
  if(!WO.length){el.innerHTML='<div class="warn">WooCommerce не загрузился. Установите плагин WP CORS на WordPress.</div>';return}
  const yr=f.yr;const orders=yr==="ALL"?WO:WO.filter(o=>(o.date_created||"").startsWith(yr));
  const totalR=orders.reduce((s,o)=>s+parseFloat(o.total||0),0);
  const avg=orders.length?totalR/orders.length:0;
  const fopCut=totalR*(SETS.fopTax+SETS.fopBank)/100;
  const byM={};orders.forEach(o=>{const m=(o.date_created||"").substring(0,7);if(!byM[m])byM[m]={r:0,c:0};byM[m].r+=parseFloat(o.total||0);byM[m].c++});const ms=Object.keys(byM).sort();
  const prods={};orders.forEach(o=>{(o.line_items||[]).forEach(li=>{if(parseFloat(li.total||0)>0){const n=li.name||"?";if(!prods[n])prods[n]={r:0,q:0};prods[n].r+=parseFloat(li.total);prods[n].q+=li.quantity||1}})});
  const topP=Object.entries(prods).map(([n,d])=>({n,...d})).sort((a,b)=>b.r-a.r).slice(0,10);
  const srcs={};orders.forEach(o=>{const s=((o.meta_data||[]).find(x=>x.key==="_metorik_utm_source")||{}).value||"direct";srcs[s]=(srcs[s]||0)+1});
  const srcS=Object.entries(srcs).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const cities={};orders.forEach(o=>{const c=o.shipping?.city||o.billing?.city;if(c)cities[c]=(cities[c]||0)+1});
  const topCit=Object.entries(cities).sort((a,b)=>b[1]-a[1]).slice(0,8);

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Выручка</div><div class="v g">${ff(toCur(totalR))}${c$}</div></div>
      <div class="kpi"><div class="l">Заказов</div><div class="v">${orders.length}</div></div>
      <div class="kpi"><div class="l">Ср.чек</div><div class="v">${ff(toCur(avg))}${c$}</div></div>
      <div class="kpi"><div class="l">ФОП налоги</div><div class="v rd">${ff(toCur(fopCut))}${c$}</div><div class="s">${SETS.fopTax}%+${SETS.fopBank}%</div></div>
    </div>
    <div class="cc"><h3>Заказы помесячно</h3><canvas id="cs1" height="90"></canvas></div>
    <div class="row">
      <div class="cc"><h3>Топ товаров</h3><table class="tbl"><tr><th>Товар</th><th class="r">Выр.</th><th class="r">Шт</th></tr>${topP.map(p=>'<tr><td>'+p.n.substring(0,25)+'</td><td class="r g">'+ff(toCur(p.r))+c$+'</td><td class="r">'+p.q+'</td></tr>').join("")}<tr class="tot"><td>Итого</td><td class="r g">${ff(toCur(topP.reduce((s,p)=>s+p.r,0)))}${c$}</td><td class="r">${topP.reduce((s,p)=>s+p.q,0)}</td></tr></table></div>
      <div class="cc"><h3>Источники / Города</h3><table class="tbl"><tr><th>UTM</th><th class="r">Зак.</th></tr>${srcS.map(([s,c])=>'<tr><td>'+s+'</td><td class="r">'+c+'</td></tr>').join("")}</table>
        <table class="tbl" style="margin-top:8px"><tr><th>Город</th><th class="r">Зак.</th></tr>${topCit.map(([c,n])=>'<tr><td>'+c+'</td><td class="r">'+n+'</td></tr>').join("")}</table></div>
    </div>`;
  dc("cs1");CH.cs1=new Chart(document.getElementById("cs1"),{type:"bar",data:{labels:ms,datasets:[{label:"Выручка",data:ms.map(m=>toCur(byM[m].r)),backgroundColor:"#10b981",borderRadius:2,yAxisID:"y"},{label:"Заказов",data:ms.map(m=>byM[m].c),type:"line",borderColor:"#f59e0b",pointRadius:2,pointBackgroundColor:"#f59e0b",borderWidth:1.5,yAxisID:"y1"}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{ticks:{color:"#7d8196",font:{size:8}},grid:{color:"#1e2130"}},y:{position:"left",ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}},y1:{position:"right",ticks:{color:"#f59e0b",font:{size:9}},grid:{display:false}}}}});
}

// ========== STOCK ==========
function rStock(){
  const el=document.getElementById("t-stock");
  const it=SK.map(s=>{const w=gv(s,"вино")||"";const vi=gv(s,"урожай")||"";const st=pn(gv(s,"остаток")||"0");const so=pn(gv(s,"продано")||"0");const av=pn(gv(s,"сред")||"0");const mr=gv(s,"запас")||"";const mo=mr&&mr!=="N/A"?parseFloat(mr):null;return{w,vi,st,so,av,mo}}).filter(s=>s.st>0);
  it.sort((a,b)=>{if(a.mo===null)return 1;if(b.mo===null)return-1;return a.mo-b.mo});
  const tb=it.reduce((s,i)=>s+i.st,0),lo=it.filter(i=>i.mo!==null&&i.mo<2).length,lo3=it.filter(i=>i.mo!==null&&i.mo<3).length,sk=it.filter(i=>i.mo!==null&&i.mo>15).length;
  el.innerHTML=`
    <div class="info">Склад: статичные данные. Для live подключите IMPORTRANGE из 1С.</div>
    <div class="kpis"><div class="kpi"><div class="l">Позиций</div><div class="v">${it.length}</div></div><div class="kpi"><div class="l">Бутылок</div><div class="v">${ff(tb)}</div></div><div class="kpi"><div class="l">Крит.</div><div class="v rd">${lo}</div><div class="s">&lt;2м</div></div><div class="kpi"><div class="l">Заканч.</div><div class="v" style="color:#e11d48">${lo3}</div><div class="s">&lt;3м</div></div><div class="kpi"><div class="l">Застр.</div><div class="v" style="color:#f59e0b">${sk}</div><div class="s">&gt;15м</div></div></div>
    <div class="lgd"><span><i style="background:#ef4444"></i>&lt;2м</span><span><i style="background:#e11d48"></i>&lt;3м</span><span><i style="background:#f59e0b"></i>Застр.</span><span><i style="background:#10b981"></i>Норма</span></div>
    ${it.map(i=>{const t=i.st+i.so,p=t>0?(i.st/t*100):0;const cr=i.mo!==null&&i.mo<2;const lw=i.mo!==null&&i.mo<3;const st=i.mo!==null&&i.mo>15;const cl=cr||lw?"low":st?"stk":"";const co=cr?"#ef4444":lw?"#e11d48":st?"#f59e0b":"#10b981";return'<div class="si '+cl+'"><div class="top"><span class="nm">'+i.w+' '+i.vi+'</span><span style="color:'+co+';font-weight:600">'+ff(i.st)+' · '+(i.mo!==null?i.mo.toFixed(1)+'м':'N/A')+'</span></div><div class="bar"><div class="bf" style="width:'+p+'%;background:'+co+'"></div></div><div class="bot"><span>Продано: '+ff(i.so)+'</span><span>~'+i.av+'/мес</span></div></div>'}).join("")}`;
}

// ========== CASH FLOW ==========
function rCash(f){
  const el=document.getElementById("t-cash"),c$=cs();
  const uahB=pn(gv(BL.find(b=>gv(b,"валют")==="UAH")||{},"баланс")||"0");
  const eurB=pn(gv(BL.find(b=>gv(b,"валют")==="EUR")||{},"баланс")||"0");
  const usdB=pn(gv(BL.find(b=>gv(b,"валют")==="USD")||{},"баланс")||"0");
  const totalB=uahB+eurB*FX.EUR+usdB*FX.USD;
  const totalEUR=uahB/FX.EUR+eurB+usdB*FX.USD/FX.EUR;
  const totalUSD=uahB/FX.USD+eurB*FX.EUR/FX.USD+usdB;
  const ft=f.yr!=="ALL"?T.filter(t=>t.yr===f.yr):T;
  const byM={};ft.forEach(t=>{if(!byM[t.ym])byM[t.ym]={i:0,o:0};if(t.amt>0)byM[t.ym].i+=t.amt;else byM[t.ym].o+=Math.abs(t.amt)});
  const ms=Object.keys(byM).sort();const netto=ms.map(m=>byM[m].i-byM[m].o);
  // Cumulative
  let cum=0;const cumData=netto.map(n=>{cum+=n;return cum});
  // Last dates
  const lastD={};T.forEach(t=>{if(!lastD[t.src]||t.ym>lastD[t.src])lastD[t.src]=t.ym});

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Всего ₴</div><div class="v" style="color:#f59e0b">${ff(totalB)} ₴</div></div>
      <div class="kpi"><div class="l">Всего €</div><div class="v" style="color:#3b82f6">${ff(totalEUR)} €</div></div>
      <div class="kpi"><div class="l">Всего $</div><div class="v" style="color:#10b981">${ff(totalUSD)} $</div></div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="l">₴ счёт</div><div class="v">${ff(uahB)}</div></div>
      <div class="kpi"><div class="l">€ счёт</div><div class="v">${ff(eurB)}</div><div class="s">=${ff(eurB*FX.EUR)}₴</div></div>
      <div class="kpi"><div class="l">$ счёт</div><div class="v">${ff(usdB)}</div><div class="s">=${ff(usdB*FX.USD)}₴</div></div>
    </div>
    <div class="cc"><h3>Входящие vs Исходящие (брутто)</h3><canvas id="cc1" height="100"></canvas></div>
    <div class="row">
      <div class="cc"><h3>Нетто помесячно</h3><canvas id="cc2" height="100"></canvas></div>
      <div class="cc"><h3>Кумулятивный нетто</h3><canvas id="cc3" height="100"></canvas></div>
    </div>
    <div class="cc"><h3>Последние обновления</h3><table class="tbl"><tr><th>Источник</th><th class="r">Данные до</th></tr>${Object.entries(lastD).sort().map(([s,d])=>'<tr><td>'+s+'</td><td class="r">'+d+'</td></tr>').join("")}</table>
    <p style="font-size:9px;color:#7d8196;margin-top:6px">€1=${FX.EUR.toFixed(2)}₴ · $1=${FX.USD.toFixed(2)}₴ (НБУ)</p></div>`;
  dc("cc1");CH.cc1=new Chart(document.getElementById("cc1"),{type:"bar",data:{labels:ms,datasets:[{label:"Вход",data:ms.map(m=>byM[m].i),backgroundColor:"#10b981",borderRadius:2},{label:"Выход",data:ms.map(m=>byM[m].o),backgroundColor:"rgba(239,68,68,.5)",borderRadius:2}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{ticks:{color:"#7d8196",font:{size:7},maxTicksLimit:14},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
  dc("cc2");CH.cc2=new Chart(document.getElementById("cc2"),{type:"bar",data:{labels:ms,datasets:[{data:netto,backgroundColor:netto.map(v=>v>=0?"#10b981":"#ef4444"),borderRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7d8196",font:{size:7},maxTicksLimit:14},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
  dc("cc3");CH.cc3=new Chart(document.getElementById("cc3"),{type:"line",data:{labels:ms,datasets:[{data:cumData,borderColor:"#8b5cf6",backgroundColor:"rgba(139,92,246,.08)",fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>ff(c.raw)+" ₴"}}},scales:{x:{ticks:{color:"#7d8196",font:{size:7},maxTicksLimit:14},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
}

// ========== UNRECOGNIZED ==========
function rUnrec(){
  const el=document.getElementById("t-unrec");
  const unrec=T.filter(t=>t.cat==="???"||t.cat===""||t.cat.includes("???"));
  const byA={};unrec.forEach(t=>{const a=t.alias||t.name||"(пусто)";if(!byA[a])byA[a]={cnt:0,amt:0,src:t.src};byA[a].cnt++;byA[a].amt+=t.amt});
  const sorted=Object.entries(byA).map(([n,d])=>({n,...d})).sort((a,b)=>Math.abs(b.amt)-Math.abs(a.amt));
  el.innerHTML=`
    ${sorted.length?'<div class="warn">'+sorted.length+' нераспознанных на '+ff(Math.abs(sorted.reduce((s,x)=>s+x.amt,0)))+' ₴. Обновите workerNEW в BW_accounts.</div>':'<div class="info">Все контрагенты распознаны ✓</div>'}
    <div class="cc"><h3>Нераспознанные</h3><table class="tbl"><tr><th>Контрагент</th><th class="r">Источник</th><th class="r">Сумма</th><th class="r">Опер.</th></tr>
      ${sorted.map(x=>'<tr><td>'+x.n.substring(0,35)+'</td><td class="r" style="color:#7d8196">'+x.src+'</td><td class="r '+(x.amt>0?"g":"rd")+'">'+ff(x.amt)+' ₴</td><td class="r">'+x.cnt+'</td></tr>').join("")}</table></div>`;
}
