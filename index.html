<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beykush Winery Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div id="login-screen">
  <span class="logo"><span class="logo-dot"></span>BEYKUSH WINERY</span>
  <div style="font-size:10px;color:#7d8196;margin-bottom:16px">Dashboard</div>
  <div id="g_id_onload" data-auto_prompt="false"></div>
  <div id="google-btn" style="margin-bottom:12px"></div>
  <div style="font-size:9px;color:#7d8196;margin-bottom:8px">або</div>
  <input type="password" id="login-pass" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Увійти</button>
  <div class="err" id="login-err"></div>
</div>
<div id="app" class="hidden">
<div class="hdr"><div class="dot"></div><h1>BEYKUSH WINERY</h1><span class="badge">Live</span><span class="st" id="status" style="color:#f59e0b">⏳</span><span id="user-info" style="font-size:9px;color:#7d8196;margin-left:auto;margin-right:8px"></span><button class="logout-btn" onclick="doLogout()">Вийти</button></div>
<div class="sub" id="subtitle">Завантаження...</div>
<div class="tabs" id="tabs">
  <button class="tab on" onclick="sw('pl',this)">P&L</button>
  <button class="tab" onclick="sw('sales',this)">Продажі</button>
  <button class="tab" onclick="sw('exp',this)">Витрати</button>
  <button class="tab" onclick="sw('assets',this)">Осн.фонди</button>
  <button class="tab" onclick="sw('shop',this)">Магазин</button>
  <button class="tab" onclick="sw('stock',this)">Склад</button>
  <button class="tab" onclick="sw('cash',this)">Кеш-фло</button>
  <button class="tab" onclick="sw('mkt',this)">Маркетинг</button>
  <button class="tab" onclick="sw('partners',this)">Партнери</button>
  <button class="tab" onclick="sw('unrec',this)">⚠️</button>
  <button class="tab" onclick="sw('settings',this)">⚙</button>
</div>
<div id="filterbar" class="filters"></div>
<div id="ld"><p style="text-align:center;padding:80px 0;color:#7d8196">Завантаження даних...</p></div>
<div id="t-pl" class="hidden"></div>
<div id="t-sales" class="hidden"></div>
<div id="t-exp" class="hidden"></div>
<div id="t-assets" class="hidden"></div>
<div id="t-shop" class="hidden"></div>
<div id="t-stock" class="hidden"></div>
<div id="t-cash" class="hidden"></div>
<div id="t-mkt" class="hidden"></div>
<div id="t-partners" class="hidden"></div>
<div id="t-unrec" class="hidden"></div>
<div id="t-settings" class="hidden"></div>
<div id="modal" class="modal hidden"></div>
</div>
<script src="js/config.js?v=11"></script>
<script src="js/data.js?v=11"></script>
<script src="js/tabs/pl.js?v=11"></script>
<script src="js/tabs/sales.js?v=11"></script>
<script src="js/tabs/exp.js?v=11"></script>
<script src="js/tabs/assets.js?v=11"></script>
<script src="js/tabs/shop.js?v=11"></script>
<script src="js/tabs/stock.js?v=11"></script>
<script src="js/tabs/cash.js?v=11"></script>
<script src="js/tabs/mkt.js?v=11"></script>
<script src="js/tabs/partners.js?v=11"></script>
<script src="js/tabs/unrec.js?v=11"></script>
<script src="js/tabs/settings.js?v=11"></script>
<script src="js/app.js?v=11"></script>
</body>
</html>
