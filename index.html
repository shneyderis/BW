<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e13;color:#e4e5ea;font-family:'DM Sans',sans-serif;max-width:980px;margin:0 auto;padding:12px 16px 40px}
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}.hdr .dot{width:8px;height:8px;border-radius:50%;background:#9f1239}.hdr h1{font-size:17px;font-weight:700;letter-spacing:-.5px}.hdr .badge{font-size:9px;color:#7d8196;background:#151821;padding:2px 7px;border-radius:10px}.hdr .st{font-size:9px;margin-left:auto}
.sub{font-size:10px;color:#7d8196;margin-bottom:10px}
.tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap;align-items:center}.tab{padding:5px 11px;border-radius:5px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;background:#151821;color:#7d8196;transition:all .15s}.tab.on{background:#9f1239;color:#fff}
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.flt{padding:4px 8px;border-radius:5px;border:1px solid #232738;background:#151821;color:#e4e5ea;font-size:10px;font-family:inherit;cursor:pointer}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:10px}
.kpi{background:#151821;border-radius:7px;padding:10px 12px;border:1px solid #232738}.kpi .l{font-size:9px;color:#7d8196;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}.kpi .v{font-size:18px;font-weight:700}.kpi .s{font-size:9px;color:#7d8196;margin-top:1px}
.cc{background:#151821;border-radius:7px;padding:12px;border:1px solid #232738;margin-bottom:10px}.cc h3{font-size:10px;font-weight:600;color:#7d8196;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}@media(max-width:700px){.row{grid-template-columns:1fr}}
.tbl{width:100%;border-collapse:collapse;font-size:10px}.tbl th{text-align:left;padding:5px 3px;color:#7d8196;font-weight:500;border-bottom:1px solid #232738}.tbl td{padding:4px 3px;border-bottom:1px solid rgba(35,39,56,.3)}.tbl .r{text-align:right}.tbl .g{color:#10b981}.tbl .rd{color:#ef4444}.tbl tr.click{cursor:pointer}.tbl tr.click:hover{background:#1e2130}.tbl .tot td{font-weight:700;border-top:2px solid #232738}
.si{margin-bottom:5px;padding:7px 9px;background:#151821;border-radius:5px;border:1px solid #232738}.si.low{border-color:rgba(239,68,68,.3)}.si.stk{border-color:rgba(245,158,11,.3)}.si .top{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px}.si .nm{font-weight:600}.si .bar{height:3px;background:#232738;border-radius:2px;overflow:hidden}.si .bf{height:100%;border-radius:2px}.si .bot{display:flex;justify-content:space-between;margin-top:2px;font-size:9px;color:#7d8196}
.lgd{display:flex;gap:8px;margin-bottom:6px;font-size:9px;color:#7d8196}.lgd i{width:5px;height:5px;border-radius:2px;display:inline-block;margin-right:2px}
.mg{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #232738;font-size:11px;cursor:pointer}.mg:hover{background:#1e2130;margin:0 -4px;padding:6px 4px;border-radius:4px}.mg:last-child{border:none}.mg .n{font-weight:600}.mg .s{font-size:9px;color:#7d8196}.mg .v{font-weight:600;color:#10b981;text-align:right}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}.modal-c{background:#151821;border:1px solid #232738;border-radius:10px;padding:20px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto}.modal-c h2{font-size:15px;margin-bottom:12px}.modal-close{float:right;background:none;border:none;color:#7d8196;font-size:18px;cursor:pointer;padding:4px 8px}
.hidden{display:none}
.warn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:8px 10px;font-size:10px;color:#ef4444;margin-bottom:8px}
.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:6px;padding:8px 10px;font-size:10px;color:#3b82f6;margin-bottom:8px}
.sec{border-left:3px solid #9f1239;padding-left:10px;margin:14px 0 8px;font-size:12px;font-weight:600;color:#e4e5ea}
.sh-tabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}.sh-tab{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:9px;font-weight:600;font-family:inherit;background:#1e2130;color:#7d8196;transition:all .15s}.sh-tab.on{background:#9f1239;color:#fff}
.sh-kpi{background:#151821;border-radius:7px;padding:8px 10px;border:1px solid #232738;text-align:center}.sh-kpi .l{font-size:8px;color:#7d8196;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}.sh-kpi .v{font-size:16px;font-weight:700}.sh-kpi .s{font-size:8px;color:#7d8196;margin-top:1px}.sh-kpi .cmp{font-size:8px;margin-top:1px}
.sh-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}@media(max-width:700px){.sh-grid3{grid-template-columns:1fr 1fr}}
.stock-badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600}.stock-in{background:rgba(16,185,129,.15);color:#10b981}.stock-low{background:rgba(245,158,11,.15);color:#f59e0b}.stock-out{background:rgba(239,68,68,.15);color:#ef4444}
.bar-h{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:3px 0}.bar-seg{height:100%}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh}
#login-screen .logo{font-size:22px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
#login-screen .logo-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#9f1239;margin-right:6px}
#login-screen input{background:#151821;border:1px solid #232738;color:#e4e5ea;padding:10px 14px;border-radius:6px;font-size:13px;font-family:inherit;width:220px;margin:10px 0;text-align:center}
#login-screen button{background:#9f1239;color:#fff;border:none;padding:8px 24px;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
#login-screen .err{color:#ef4444;font-size:10px;margin-top:6px;height:14px}
.logout-btn{background:none;border:1px solid #232738;color:#7d8196;font-size:9px;padding:2px 8px;border-radius:4px;cursor:pointer;font-family:inherit;margin-left:auto}
</style>
</head>
<body>
<div id="login-screen">
  <span class="logo"><span class="logo-dot"></span>BEYKUSH WINERY</span>
  <div style="font-size:10px;color:#7d8196;margin-bottom:16px">Dashboard</div>
  <input type="password" id="login-pass" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Войти</button>
  <div class="err" id="login-err"></div>
</div>
<div id="app" class="hidden">
<div class="hdr"><div class="dot"></div><h1>BEYKUSH WINERY</h1><span class="badge">Live</span><span class="st" id="status" style="color:#f59e0b">⏳</span><button class="logout-btn" onclick="doLogout()">Выход</button></div>
<div class="sub" id="subtitle">Загрузка...</div>
<div class="tabs" id="tabs">
  <button class="tab on" onclick="sw('pl',this)">P&L</button>
  <button class="tab" onclick="sw('sales',this)">Продажи</button>
  <button class="tab" onclick="sw('exp',this)">Расходы</button>
  <button class="tab" onclick="sw('assets',this)">Осн.фонды</button>
  <button class="tab" onclick="sw('shop',this)">Магазин</button>
  <button class="tab" onclick="sw('stock',this)">Склад</button>
  <button class="tab" onclick="sw('cash',this)">Кэш-фло</button>
  <button class="tab" onclick="sw('unrec',this)">⚠️</button>
  <button class="tab" onclick="sw('settings',this)">⚙</button>
</div>
<div id="filterbar" class="filters"></div>
<div id="ld"><p style="text-align:center;padding:80px 0;color:#7d8196">Загрузка данных...</p></div>
<div id="t-pl" class="hidden"></div><div id="t-sales" class="hidden"></div><div id="t-exp" class="hidden"></div><div id="t-assets" class="hidden"></div><div id="t-shop" class="hidden"></div><div id="t-stock" class="hidden"></div><div id="t-cash" class="hidden"></div><div id="t-unrec" class="hidden"></div><div id="t-settings" class="hidden"></div>
<div id="modal" class="modal hidden"></div>
</div><!-- /app -->

<script>
// ========== AUTH ==========
const ROLES={
  owner:{password:"beykush2024",tabs:["pl","sales","exp","assets","shop","stock","cash","unrec","settings"]},
  manager:{password:"sales2024",tabs:["sales","shop","stock"]},
  accountant:{password:"acc2024",tabs:["pl","exp","assets","cash"]}
};
let currentRole=null;
function doLogin(){
  const p=document.getElementById("login-pass").value;
  for(const[role,cfg]of Object.entries(ROLES)){
    if(cfg.password===p){currentRole=role;sessionStorage.setItem("bw_role",role);showApp(cfg.tabs);return}
  }
  document.getElementById("login-err").textContent="Неверный пароль";
}
function doLogout(){sessionStorage.removeItem("bw_role");currentRole=null;document.getElementById("app").classList.add("hidden");document.getElementById("login-screen").classList.remove("hidden");document.getElementById("login-pass").value=""}
function showApp(tabs){
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.querySelectorAll('.tab').forEach(btn=>{
    const id=btn.getAttribute('onclick')?.match(/sw\('(\w+)'/)?.[1];
    if(id){btn.classList.toggle("hidden",!tabs.includes(id));if(!tabs.includes(id)&&btn.classList.contains("on")){btn.classList.remove("on")}}
  });
  // Activate first visible tab
  const firstVisible=document.querySelector('.tab:not(.hidden)');
  if(firstVisible&&!document.querySelector('.tab.on:not(.hidden)')){firstVisible.classList.add("on");const id=firstVisible.getAttribute('onclick')?.match(/sw\('(\w+)'/)?.[1];if(id){['pl','sales','exp','assets','shop','stock','cash','unrec','settings'].forEach(t=>document.getElementById('t-'+t).classList.add('hidden'));document.getElementById('t-'+id).classList.remove('hidden')}}
  load();
}
// Auto-login from session
(function(){const r=sessionStorage.getItem("bw_role");if(r&&ROLES[r]){currentRole=r;showApp(ROLES[r].tabs)}})();
const SID="1K52LGIjxaQg1LfmjdVKXA0-wMh0MVUo16q-Z6BiNOsQ";
const WC="/api/wc";
const WCK="consumer_key=ck_5b87215529858139d17b602945170ae4d9c8adbd&consumer_secret=cs_3ad054a505185162e849a92bf019979e6c037c93";
const IGN=["#ignore","Конвертація","ІГНОР!!!","Банк???","Банк, Еквайринг"];
const ZP=["ЗП менеджерів","ЗП Виноградник","ЗП Виноробня","ЗП Готель","ЗП Цибак","BW Света","BW Наташа","BW Таня"];
const ACATS=["Обладнання виноробні","Обладнання виноградник","Обладнання, власний транспорт"];
let T=[],SK=[],BL=[],WO=[],WP=[],WCU=[],FX={EUR:44,USD:41},CH={},SETS={fopTax:7.5,fopBank:0,dispCur:"UAH"};
function pn(s){if(!s||s==="")return 0;s=String(s).trim();let ng=false;if(s.startsWith("(")&&s.endsWith(")")){ng=true;s=s.slice(1,-1)}if(s.startsWith("-")){ng=true;s=s.slice(1)}s=s.replace(/[₴$€\s]/g,"").replace(/,/g,"");let n=parseFloat(s);return isNaN(n)?0:ng?-n:n}
const fm=n=>{if(!n&&n!==0)return"—";const a=Math.abs(n);if(a>=1e6)return(n/1e6).toFixed(1)+"M";if(a>=1e3)return(n/1e3).toFixed(0)+"K";return n.toFixed(0)};
const ff=n=>n?new Intl.NumberFormat("uk-UA",{maximumFractionDigits:0}).format(n):"0";
function gv(o,s){for(const k of Object.keys(o)){if(k.trim().toLowerCase().startsWith(s.toLowerCase()))return o[k]}return""}
function toCur(v){if(SETS.dispCur==="EUR")return v/FX.EUR;if(SETS.dispCur==="USD")return v/FX.USD;return v}
function cs(){return SETS.dispCur==="EUR"?"€":SETS.dispCur==="USD"?"$":"₴"}
async function csvF(sh){const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sh)}`);const t=await r.text();const rows=[];let c=[],q=false,f="";for(let i=0;i<t.length;i++){const x=t[i];if(q){if(x==='"'&&t[i+1]==='"'){f+='"';i++}else if(x==='"')q=false;else f+=x}else{if(x==='"')q=true;else if(x===','){c.push(f);f=""}else if(x==='\n'||(x==='\r'&&t[i+1]==='\n')){c.push(f);f="";rows.push(c);c=[];if(x==='\r')i++}else f+=x}}if(f||c.length){c.push(f);rows.push(c)}if(rows.length<2)return[];const h=rows[0].map(x=>x.trim());return rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>{o[k]=r[i]!==undefined?r[i].trim():""});return o})}
async function wcF(ep,p=""){let all=[],pg=1;while(pg<=100){try{const r=await fetch(`${WC}/${ep}?${WCK}&per_page=100&page=${pg}&${p}`);if(!r.ok)break;const d=await r.json();if(!d.length)break;all=all.concat(d);if(d.length<100)break;pg++}catch(e){break}}return all}
async function nbuF(){try{const r=await fetch("https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json");const d=await r.json();const e=d.find(x=>x.cc==="EUR"),u=d.find(x=>x.cc==="USD");if(e)FX.EUR=e.rate;if(u)FX.USD=u.rate}catch(e){}}
function net(t){
  if(t.tp==="Доход"&&(t.src==="PRIVAT"||t.src==="VOSTOK")&&t.cat!=="Продаж, Експорт")return t.amt/1.2;
  if(t.tp==="Расход"&&(t.src==="PRIVAT"||t.src==="VOSTOK")&&!ZP.some(z=>t.cat.includes(z))&&!t.cat.includes("Податки")&&!t.cat.includes("Банківська"))return t.amt/1.2;
  return t.amt;
}
function isA(t){return ACATS.some(a=>t.cat.includes(a))}
function sT(t){return(t.src==="2fMK"||t.src==="2fKiev")?"2Ф":"1Ф"}

async function load(){
  try{
    // Phase 1: Sheets + NBU (fast) → render immediately
    await nbuF();
    const[t,s,b]=await Promise.all([csvF("Dashboard_Data"),csvF("3_Stock"),csvF("6_Balances")]);
    T=t.map(x=>{const mo=String(pn(gv(x,"month"))||gv(x,"month")||"");return{mo,money:gv(x,"money")||"",name:gv(x,"name")||"",alias:gv(x,"alias")||"",cat:gv(x,"category")||"",geo:gv(x,"geo")||"",mgr:gv(x,"менеджер")||gv(x,"manager")||"",amt:pn(gv(x,"sum_uah")),com:pn(gv(x,"commission")),sm:pn(gv(x,"sum_money")),src:gv(x,"source")||""}}).filter(x=>{const m=parseInt(x.mo);return m>=202001&&!IGN.includes(x.cat)&&x.cat!==""});
    T.forEach(x=>{x.yr=x.mo.substring(0,4);x.mm=x.mo.substring(4,6);x.ym=x.yr+"-"+x.mm;x.tp=x.amt>0?"Доход":"Расход";x.nt=net(x);x.st=sT(x)});
    SK=s;BL=b;
    const yrs=[...new Set(T.map(x=>x.yr))].filter(y=>y>="2020").sort();
    const lastTxn=T.length?T.reduce((a,b)=>a.mo>b.mo?a:b).ym:"?";
    document.getElementById("status").textContent="● Connected";document.getElementById("status").style.color="#10b981";
    document.getElementById("subtitle").textContent=ff(T.length)+" опер · до "+lastTxn+" · €"+FX.EUR.toFixed(2)+" $"+FX.USD.toFixed(2)+" · ⏳ WC...";
    document.getElementById("ld").classList.add("hidden");
    bldFlt(yrs);render();

    // Phase 2: WooCommerce in background (with localStorage cache)
    const WC_CACHE_KEY="bw_wc_cache",WC_TTL=15*60*1000;
    let cached=null;
    try{const raw=localStorage.getItem(WC_CACHE_KEY);if(raw){cached=JSON.parse(raw);if(Date.now()-cached.ts>WC_TTL)cached=null}}catch(e){}
    if(cached){WO=cached.orders||[];WP=cached.products||[];WCU=cached.customers||[]}
    else{
      const wcAfter=new Date();wcAfter.setFullYear(wcAfter.getFullYear()-1);const wcDateStr=wcAfter.toISOString();
      const[wo,wp,wcu]=await Promise.all([
        wcF("orders","status=completed,processing,cancelled,refunded,pending,on-hold,failed&after="+wcDateStr).catch(()=>[]),
        wcF("products","").catch(()=>[]),
        wcF("customers","").catch(()=>[])
      ]);
      WO=wo;WP=wp;WCU=wcu;
      try{localStorage.setItem(WC_CACHE_KEY,JSON.stringify({ts:Date.now(),orders:WO,products:WP,customers:WCU}))}catch(e){}
    }
    document.getElementById("subtitle").textContent=ff(T.length)+" опер · "+WO.length+" WC заказов · "+WP.length+" товаров · до "+lastTxn+" · €"+FX.EUR.toFixed(2)+" $"+FX.USD.toFixed(2);
    render();
  }catch(e){document.getElementById("status").textContent="● Err";document.getElementById("status").style.color="#ef4444";document.getElementById("ld").innerHTML='<p style="color:#ef4444;text-align:center;padding:60px">'+e.message+'</p>'}
}

function bldFlt(yrs){
  const fb=document.getElementById("filterbar");
  const geos=[...new Set(T.filter(t=>t.geo&&t.geo!=="="&&t.geo!=="-").map(t=>t.geo))].sort();
  const chs=[...new Set(T.filter(t=>t.tp==="Доход").map(t=>t.cat))].sort();
  fb.innerHTML=`
    <select class="flt" id="fY"><option value="ALL">Все годы</option>${yrs.map(y=>'<option>'+y+'</option>').join("")}</select>
    <select class="flt" id="fM"><option value="ALL">Все мес</option>${["01","02","03","04","05","06","07","08","09","10","11","12"].map(m=>'<option>'+m+'</option>').join("")}</select>
    <select class="flt" id="fS"><option value="ALL">1Ф+2Ф</option><option>1Ф</option><option>2Ф</option></select>
    <select class="flt" id="fC"><option value="ALL">Все каналы</option>${chs.map(c=>'<option value="'+c+'">'+(c.length>22?c.substring(0,22)+"…":c)+'</option>').join("")}</select>
    <select class="flt" id="fG"><option value="ALL">Все гео</option>${geos.map(g=>'<option>'+g+'</option>').join("")}</select>
    <select class="flt" id="fCur"><option value="UAH">₴</option><option value="EUR">€</option><option value="USD">$</option></select>`;
  ["fY","fM","fS","fC","fG","fCur"].forEach(id=>document.getElementById(id).onchange=()=>{if(id==="fCur")SETS.dispCur=document.getElementById("fCur").value;render()});
}
function gF(){return{yr:document.getElementById("fY")?.value||"ALL",mm:document.getElementById("fM")?.value||"ALL",src:document.getElementById("fS")?.value||"ALL",chan:document.getElementById("fC")?.value||"ALL",geo:document.getElementById("fG")?.value||"ALL"}}
function fl(list,f,tp){let r=list;if(f.yr!=="ALL")r=r.filter(t=>t.yr===f.yr);if(f.mm!=="ALL")r=r.filter(t=>t.mm===f.mm);if(f.src!=="ALL")r=r.filter(t=>t.st===f.src);if(f.chan!=="ALL")r=r.filter(t=>t.cat===f.chan);if(f.geo!=="ALL")r=r.filter(t=>t.geo===f.geo);if(tp)r=r.filter(t=>t.tp===tp);return r}
function sw(id,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');['pl','sales','exp','assets','shop','stock','cash','unrec','settings'].forEach(t=>document.getElementById('t-'+t).classList.add('hidden'));document.getElementById('t-'+id).classList.remove('hidden');render()}
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id]}}
const CHS=["Продаж, Мережі","Продаж, Horeca & Shops","Продаж, Експорт","Доход, ФОП","Продаж, Корп клієнт","Доход, каса БВ","Продаж,  Дістрібʼютор Укр","Продаж, Інтернет магазини","Продаж, на виноробні"];
const CSH={"Продаж, Мережі":"Сети","Продаж, Horeca & Shops":"HoReCa","Продаж, Експорт":"Экспорт","Доход, ФОП":"ФОП","Продаж, Корп клієнт":"Корп","Доход, каса БВ":"Каса","Продаж,  Дістрібʼютор Укр":"Дистр","Продаж, Інтернет магазини":"Инет","Продаж, на виноробні":"Виноробня"};
const CC=["#e11d48","#8b5cf6","#10b981","#f59e0b","#3b82f6","#ec4899","#14b8a6","#6366f1","#a855f7"];
const MN=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];const MMa=["01","02","03","04","05","06","07","08","09","10","11","12"];
const COB={responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9,padding:6}}},scales:{x:{ticks:{color:"#7d8196",font:{size:9}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}};
function aY(){return[...new Set(T.map(x=>x.yr))].sort()}
function sY(f){return f.yr!=="ALL"?f.yr:aY().pop()||"2026"}
function pYr(y){return String(parseInt(y)-1)}
function mxMM(y){const ms=T.filter(t=>t.yr===y).map(t=>parseInt(t.mm));return ms.length?Math.max(...ms):12}

function render(){const f=gF();rPL(f);rSales(f);rExp(f);rAssets(f);rShop(f);rStock();rCash(f);rUnrec();rSettings()}

// ========== P&L ==========
function rPL(f){
  const el=document.getElementById("t-pl"),sy=sY(f),py=pYr(sy),mm=mxMM(sy),c$=cs();
  const opex=T.filter(t=>!isA(t));
  const yearSelected=f.yr!=="ALL";
  const monthSelected=f.mm!=="ALL";
  
  // KPIs
  const sr=opex.filter(t=>t.yr===sy&&t.tp==="Доход").reduce((s,t)=>s+t.nt,0);
  const se=opex.filter(t=>t.yr===sy&&t.tp==="Расход").reduce((s,t)=>s+t.nt,0);
  const assetY=T.filter(t=>isA(t)&&t.yr===sy&&t.tp==="Расход").reduce((s,t)=>s+Math.abs(t.nt),0);
  const sp=sr+se,sm=sr?(sp/sr*100).toFixed(1):"0";
  const pr=opex.filter(t=>t.yr===py&&parseInt(t.mm)<=mm&&t.tp==="Доход").reduce((s,t)=>s+t.nt,0);
  const gr=pr?((sr-pr)/pr*100).toFixed(1):"0";const ytd=mm<12?" →"+MN[mm-1]:"";
  // Balance
  const uahB=pn(gv(BL.find(b=>gv(b,"валют")==="UAH")||{},"баланс")||"0");
  const eurB=pn(gv(BL.find(b=>gv(b,"валют")==="EUR")||{},"баланс")||"0");
  const usdB=pn(gv(BL.find(b=>gv(b,"валют")==="USD")||{},"баланс")||"0");
  const totalB=uahB+eurB*FX.EUR+usdB*FX.USD;

  let chartHTML="",detailHTML="";
  
  if(!yearSelected){
    // === ALL YEARS: bar chart by year ===
    const yrs=aY();
    const bd=yrs.map(y=>{const ox=opex.filter(t=>t.yr===y);const r=ox.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.nt,0);const e=ox.filter(t=>t.tp==="Расход").reduce((s,t)=>s+t.nt,0);const a=T.filter(t=>isA(t)&&t.yr===y&&t.tp==="Расход").reduce((s,t)=>s+Math.abs(t.nt),0);return{y,r:toCur(r),e:toCur(Math.abs(e)),p:toCur(r+e),a:toCur(a),m:r?((r+e)/r*100):0}});
    chartHTML=`<div class="row"><div class="cc"><h3>P&L по годам (без осн.фондов)</h3><canvas id="c1" height="150"></canvas></div><div class="cc"><h3>Маржинальность %</h3><canvas id="c1m" height="150"></canvas></div></div>`;
    detailHTML=`<div class="cc"><h3>Сводная таблица</h3><table class="tbl"><tr><th></th>${yrs.map(y=>'<th class="r">'+y+'</th>').join("")}<th class="r">Итого</th></tr>
      <tr><td>Выручка нетто</td>${bd.map(d=>'<td class="r g">'+fm(d.r)+'</td>').join("")}<td class="r g">${fm(bd.reduce((s,d)=>s+d.r,0))}</td></tr>
      <tr><td>OPEX</td>${bd.map(d=>'<td class="r rd">'+fm(d.e)+'</td>').join("")}<td class="r rd">${fm(bd.reduce((s,d)=>s+d.e,0))}</td></tr>
      <tr><td>Осн.фонды</td>${bd.map(d=>'<td class="r" style="color:#3b82f6">'+fm(d.a)+'</td>').join("")}<td class="r" style="color:#3b82f6">${fm(bd.reduce((s,d)=>s+d.a,0))}</td></tr>
      <tr class="tot"><td>Прибыль</td>${bd.map(d=>'<td class="r '+(d.p>0?"g":"rd")+'">'+fm(d.p)+'</td>').join("")}<td class="r">${fm(bd.reduce((s,d)=>s+d.p,0))}</td></tr>
      <tr><td>Маржа</td>${bd.map(d=>'<td class="r">'+d.m.toFixed(1)+'%</td>').join("")}<td class="r"></td></tr></table></div>`;
  } else if(yearSelected && !monthSelected){
    // === YEAR SELECTED: monthly bars with prev year overlay ===
    const ms1={},ms2={},me1={},me2={},ma1={};
    opex.filter(t=>t.yr===sy&&t.tp==="Доход").forEach(t=>{ms1[t.mm]=(ms1[t.mm]||0)+toCur(t.nt)});
    opex.filter(t=>t.yr===py&&t.tp==="Доход").forEach(t=>{ms2[t.mm]=(ms2[t.mm]||0)+toCur(t.nt)});
    opex.filter(t=>t.yr===sy&&t.tp==="Расход").forEach(t=>{me1[t.mm]=(me1[t.mm]||0)+toCur(Math.abs(t.nt))});
    opex.filter(t=>t.yr===py&&t.tp==="Расход").forEach(t=>{me2[t.mm]=(me2[t.mm]||0)+toCur(Math.abs(t.nt))});
    T.filter(t=>isA(t)&&t.yr===sy&&t.tp==="Расход").forEach(t=>{ma1[t.mm]=(ma1[t.mm]||0)+toCur(Math.abs(t.nt))});
    chartHTML=`<div class="cc"><h3>Выручка помесячно ${sy} vs ${py}</h3><canvas id="c2r" height="90"></canvas></div>
      <div class="cc"><h3>Расходы помесячно ${sy} vs ${py} + осн.фонды</h3><canvas id="c2e" height="90"></canvas></div>`;
    // Detail: revenue by channel
    const chD=CHS.map(c=>{const v=opex.filter(t=>t.yr===sy&&t.tp==="Доход"&&t.cat===c).reduce((s,t)=>s+t.nt,0);const vp=opex.filter(t=>t.yr===py&&t.tp==="Доход"&&t.cat===c).reduce((s,t)=>s+t.nt,0);return{n:CSH[c]||c,v:toCur(v),vp:toCur(vp)}}).filter(x=>x.v>0||x.vp>0);
    const expD=[...new Set(opex.filter(t=>t.yr===sy&&t.tp==="Расход").map(t=>t.cat))].map(c=>{const v=opex.filter(t=>t.yr===sy&&t.tp==="Расход"&&t.cat===c).reduce((s,t)=>s+t.nt,0);const vp=opex.filter(t=>t.yr===py&&t.tp==="Расход"&&t.cat===c).reduce((s,t)=>s+t.nt,0);return{c,v:toCur(Math.abs(v)),vp:toCur(Math.abs(vp))}}).sort((a,b)=>b.v-a.v).slice(0,12);
    const trS=chD.reduce((s,x)=>s+x.v,0),trP=chD.reduce((s,x)=>s+x.vp,0);
    const teS=expD.reduce((s,x)=>s+x.v,0),teP=expD.reduce((s,x)=>s+x.vp,0);
    detailHTML=`<div class="row">
      <div class="cc"><h3>Доходы по каналам</h3><table class="tbl"><tr><th>Канал</th><th class="r">${sy}</th><th class="r">${py}</th><th class="r">Δ%</th></tr>
        ${chD.map(x=>{const d=x.vp?((x.v-x.vp)/x.vp*100).toFixed(0):"—";return'<tr><td>'+x.n+'</td><td class="r g">'+ff(x.v)+'</td><td class="r" style="color:#7d8196">'+ff(x.vp)+'</td><td class="r" style="color:'+(d>0?"#10b981":"#ef4444")+'">'+(d>0?"+":"")+d+'%</td></tr>'}).join("")}
        <tr class="tot"><td>Итого</td><td class="r g">${ff(trS)}</td><td class="r" style="color:#7d8196">${ff(trP)}</td><td class="r">${trP?((trS-trP)/trP*100).toFixed(0)+"%":"—"}</td></tr></table></div>
      <div class="cc"><h3>Расходы по категориям (OPEX)</h3><table class="tbl"><tr><th>Категория</th><th class="r">${sy}</th><th class="r">%выр</th><th class="r">${py}</th></tr>
        ${expD.map(x=>{const pct=trS?(x.v/trS*100).toFixed(1):"—";return'<tr><td>'+x.c.substring(0,22)+'</td><td class="r rd">'+ff(x.v)+'</td><td class="r">'+pct+'%</td><td class="r" style="color:#7d8196">'+ff(x.vp)+'</td></tr>'}).join("")}
        <tr class="tot"><td>Итого OPEX</td><td class="r rd">${ff(teS)}</td><td class="r">${trS?(teS/trS*100).toFixed(1):"—"}%</td><td class="r" style="color:#7d8196">${ff(teP)}</td></tr></table></div>
    </div>`;
  } else {
    // === MONTH SELECTED: daily breakdown ===
    const days={};const prefix=sy+f.mm;
    // We don't have daily data (grouped by month), show message
    chartHTML=`<div class="info">Данные сгруппированы помесячно. Для разбивки по дням нужны негруппированные транзакции.</div>`;
    const ft=fl(opex,f);
    const rev=ft.filter(t=>t.tp==="Доход");
    const exp=ft.filter(t=>t.tp==="Расход");
    const byAlias={};rev.forEach(t=>{const a=t.alias||t.name;if(!byAlias[a])byAlias[a]={s:0,c:0};byAlias[a].s+=toCur(t.nt);byAlias[a].c++});
    const top=Object.entries(byAlias).sort((a,b)=>b[1].s-a[1].s).slice(0,10);
    detailHTML=`<div class="row">
      <div class="cc"><h3>Доходы за ${MN[parseInt(f.mm)-1]} ${sy}: 1Ф / 2Ф</h3>
        <div class="kpis"><div class="kpi"><div class="l">1Ф</div><div class="v g">${ff(toCur(rev.filter(t=>t.st==="1Ф").reduce((s,t)=>s+t.nt,0)))}${c$}</div></div><div class="kpi"><div class="l">2Ф</div><div class="v g">${ff(toCur(rev.filter(t=>t.st==="2Ф").reduce((s,t)=>s+t.nt,0)))}${c$}</div></div></div>
        <table class="tbl"><tr><th>Контрагент</th><th class="r">Сумма</th></tr>${top.map(([n,d])=>'<tr><td>'+n.substring(0,30)+'</td><td class="r g">'+ff(d.s)+c$+'</td></tr>').join("")}</table></div>
      <div class="cc"><h3>Расходы за ${MN[parseInt(f.mm)-1]} ${sy}</h3>
        ${(()=>{const bc={};exp.forEach(t=>{bc[t.cat]=(bc[t.cat]||0)+toCur(Math.abs(t.nt))});return Object.entries(bc).sort((a,b)=>b[1]-a[1]).map(([c,v])=>'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:10px"><span>'+c.substring(0,25)+'</span><span class="rd">'+ff(v)+c$+'</span></div>').join("")})()}</div>
    </div>`;
  }

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Выручка нетто ${sy}${ytd}</div><div class="v g">${fm(toCur(sr))}${c$}</div><div class="s">${gr>0?"+":""}${gr}% vs ${py}${ytd}</div></div>
      <div class="kpi"><div class="l">OPEX ${sy}</div><div class="v rd">${fm(toCur(Math.abs(se)))}${c$}</div></div>
      <div class="kpi"><div class="l">Осн.фонды</div><div class="v" style="color:#3b82f6">${fm(toCur(assetY))}${c$}</div></div>
      <div class="kpi"><div class="l">Прибыль</div><div class="v" style="color:${sp>0?'#10b981':'#ef4444'}">${fm(toCur(sp))}${c$}</div><div class="s">Маржа ${sm}%</div></div>
      <div class="kpi"><div class="l">Баланс</div><div class="v" style="color:#f59e0b">${ff(toCur(totalB))}${c$}</div><div class="s">₴${ff(uahB)} €${ff(eurB)} $${ff(usdB)}</div></div>
    </div>
    ${chartHTML}${detailHTML}`;

  // Render charts
  if(!yearSelected){
    const yrs=aY();const bd=yrs.map(y=>{const ox=opex.filter(t=>t.yr===y);const r=ox.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.nt,0);const e=ox.filter(t=>t.tp==="Расход").reduce((s,t)=>s+t.nt,0);return{y,r:toCur(r),e:toCur(Math.abs(e)),p:toCur(r+e),m:r?((r+e)/r*100):0}});
    dc("c1");CH.c1=new Chart(document.getElementById("c1"),{type:"bar",data:{labels:yrs,datasets:[{label:"Выручка",data:bd.map(x=>x.r),backgroundColor:"#10b981",borderRadius:3},{label:"Расходы",data:bd.map(x=>x.e),backgroundColor:"rgba(239,68,68,.6)",borderRadius:3},{label:"Прибыль",data:bd.map(x=>x.p),backgroundColor:"#8b5cf6",borderRadius:3}]},options:COB});
    dc("c1m");CH.c1m=new Chart(document.getElementById("c1m"),{type:"line",data:{labels:yrs,datasets:[{label:"Маржа",data:bd.map(x=>x.m),borderColor:"#f59e0b",backgroundColor:"rgba(245,158,11,.1)",fill:true,tension:.3,pointRadius:3,pointBackgroundColor:"#f59e0b",borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7d8196"},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",callback:v=>v.toFixed(0)+"%"},grid:{color:"#1e2130"}}}}});
  } else if(!monthSelected){
    const ms1={},ms2={},me1={},me2={},ma1={};
    opex.filter(t=>t.yr===sy&&t.tp==="Доход").forEach(t=>{ms1[t.mm]=(ms1[t.mm]||0)+toCur(t.nt)});
    opex.filter(t=>t.yr===py&&t.tp==="Доход").forEach(t=>{ms2[t.mm]=(ms2[t.mm]||0)+toCur(t.nt)});
    opex.filter(t=>t.yr===sy&&t.tp==="Расход").forEach(t=>{me1[t.mm]=(me1[t.mm]||0)+toCur(Math.abs(t.nt))});
    opex.filter(t=>t.yr===py&&t.tp==="Расход").forEach(t=>{me2[t.mm]=(me2[t.mm]||0)+toCur(Math.abs(t.nt))});
    T.filter(t=>isA(t)&&t.yr===sy&&t.tp==="Расход").forEach(t=>{ma1[t.mm]=(ma1[t.mm]||0)+toCur(Math.abs(t.nt))});
    dc("c2r");CH.c2r=new Chart(document.getElementById("c2r"),{type:"bar",data:{labels:MN,datasets:[{label:sy,data:MMa.map(m=>ms1[m]||0),backgroundColor:"#10b981",borderRadius:3},{label:py,data:MMa.map(m=>ms2[m]||0),backgroundColor:"rgba(139,92,246,.35)",borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}},tooltip:{callbacks:{label:c=>c.dataset.label+": "+ff(c.raw)+cs()}}},scales:{x:{ticks:{color:"#7d8196"},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
    dc("c2e");CH.c2e=new Chart(document.getElementById("c2e"),{type:"bar",data:{labels:MN,datasets:[{label:"OPEX "+sy,data:MMa.map(m=>me1[m]||0),backgroundColor:"rgba(239,68,68,.55)",borderRadius:3},{label:"OPEX "+py,data:MMa.map(m=>me2[m]||0),backgroundColor:"rgba(239,68,68,.2)",borderRadius:3},{label:"Осн.фонды",data:MMa.map(m=>ma1[m]||0),backgroundColor:"rgba(59,130,246,.5)",borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{ticks:{color:"#7d8196"},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
  }
}

// ========== SALES ==========
function rSales(f){
  const el=document.getElementById("t-sales"),c$=cs();
  const ft=fl(T,f,"Доход");
  const pd=CHS.map(c=>{const v=ft.filter(t=>t.cat===c).reduce((s,t)=>s+toCur(t.nt),0);return{n:CSH[c]||c,c,v}}).filter(x=>x.v>1000);
  const bm={};ft.forEach(t=>{const m=t.mgr;if(!m||m==="-"||m==="="||!m.trim())return;if(!bm[m])bm[m]={s:0,c:0,cnt:0};bm[m].s+=toCur(t.nt);bm[m].c+=toCur(t.com);bm[m].cnt++});
  const mgrs=Object.entries(bm).map(([n,d])=>({n,...d})).sort((a,b)=>b.s-a.s);
  const bc={};ft.forEach(t=>{const a=t.alias||t.name;if(!a||a==="#ignore")return;if(!bc[a])bc[a]={s:0,cnt:0,src:t.st};bc[a].s+=toCur(t.nt);bc[a].cnt++});
  const topC=Object.entries(bc).map(([n,d])=>({n,...d})).sort((a,b)=>b.s-a.s).slice(0,15);
  // Export in foreign currency
  const expFt=ft.filter(t=>t.cat==="Продаж, Експорт");
  const expEUR=expFt.filter(t=>t.money==="EUR").reduce((s,t)=>s+t.sm,0);
  const expUSD=expFt.filter(t=>t.money==="USD").reduce((s,t)=>s+t.sm,0);
  // Revenue 1F vs 2F
  const r1f=ft.filter(t=>t.st==="1Ф").reduce((s,t)=>s+toCur(t.nt),0);
  const r2f=ft.filter(t=>t.st==="2Ф").reduce((s,t)=>s+toCur(t.nt),0);
  const totalR=ft.reduce((s,t)=>s+toCur(t.nt),0);
  // Channels by year
  const chYrs=aY();const chD=chYrs.map(y=>{const yt=T.filter(t=>t.yr===y&&t.tp==="Доход");const o={};CHS.forEach(c=>{o[CSH[c]]=toCur(yt.filter(t=>t.cat===c).reduce((s,t)=>s+t.nt,0))});return{year:y,...o}});

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Всего</div><div class="v g">${fm(totalR)}${c$}</div></div>
      <div class="kpi"><div class="l">1Ф</div><div class="v">${fm(r1f)}${c$}</div><div class="s">${totalR?(r1f/totalR*100).toFixed(0):'0'}%</div></div>
      <div class="kpi"><div class="l">2Ф</div><div class="v">${fm(r2f)}${c$}</div><div class="s">${totalR?(r2f/totalR*100).toFixed(0):'0'}%</div></div>
      ${expFt.length?'<div class="kpi"><div class="l">Экспорт €</div><div class="v" style="color:#3b82f6">'+ff(expEUR)+'€</div></div><div class="kpi"><div class="l">Экспорт $</div><div class="v" style="color:#f59e0b">'+ff(expUSD)+'$</div></div>':''}
    </div>
    <div class="cc"><h3>Каналы по годам</h3><canvas id="c5" height="120"></canvas><div style="display:flex;flex-wrap:wrap;gap:2px 8px;margin-top:6px">${CHS.map((c,i)=>'<span style="display:flex;align-items:center;gap:3px;font-size:8px;color:#7d8196"><i style="width:5px;height:5px;border-radius:2px;display:inline-block;background:'+CC[i]+'"></i>'+CSH[c]+'</span>').join("")}</div></div>
    <div class="row">
      <div class="cc"><h3>Каналы</h3><canvas id="c3" height="180"></canvas></div>
      <div class="cc"><h3>Менеджеры</h3>${mgrs.map(m=>'<div class="mg" onclick="showMgr(\''+m.n.replace(/'/g,"\\'")+'\')"><div><div class="n">'+m.n+'</div><div class="s">КМ '+(m.s?(m.c/m.s*100).toFixed(1):0)+'% · '+m.cnt+' опер</div></div><div><div class="v">'+ff(m.s)+c$+'</div><div class="s">'+ff(m.c)+c$+'</div></div></div>').join("")}
        ${mgrs.length?'<div class="mg" style="cursor:default"><div><div class="n">Итого</div></div><div><div class="v">'+ff(mgrs.reduce((s,m)=>s+m.s,0))+c$+'</div></div></div>':''}</div>
    </div>
    <div class="cc"><h3>Топ контрагентов</h3><table class="tbl"><tr><th>Контрагент</th><th class="r">1Ф/2Ф</th><th class="r">Сумма</th><th class="r">Опер.</th></tr>
      ${topC.map(c=>'<tr class="click" onclick="showContr(\''+c.n.replace(/'/g,"\\'")+'\')"><td>'+c.n.substring(0,30)+'</td><td class="r" style="color:#7d8196">'+c.src+'</td><td class="r g">'+ff(c.s)+c$+'</td><td class="r">'+c.cnt+'</td></tr>').join("")}
      <tr class="tot"><td>Итого (топ-15)</td><td></td><td class="r g">${ff(topC.reduce((s,c)=>s+c.s,0))}${c$}</td><td class="r">${topC.reduce((s,c)=>s+c.cnt,0)}</td></tr></table></div>`;
  dc("c5");CH.c5=new Chart(document.getElementById("c5"),{type:"bar",data:{labels:chYrs,datasets:CHS.map((c,i)=>({label:CSH[c],data:chD.map(d=>d[CSH[c]]||0),backgroundColor:CC[i],borderRadius:2}))},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:"#7d8196"},grid:{color:"#1e2130"}},y:{stacked:true,ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
  dc("c3");CH.c3=new Chart(document.getElementById("c3"),{type:"doughnut",data:{labels:pd.map(x=>x.n),datasets:[{data:pd.map(x=>x.v),backgroundColor:CC.slice(0,pd.length),borderWidth:0}]},options:{responsive:true,cutout:"55%",plugins:{legend:{position:"bottom",labels:{color:"#7d8196",font:{size:8},boxWidth:7,padding:4}},tooltip:{callbacks:{label:c=>c.label+": "+ff(c.raw)+cs()}}}}});
}
// Modals
window.showMgr=function(n){
  const f=gF(),c$=cs();const ft=fl(T,f).filter(t=>t.mgr===n&&t.tp==="Доход");
  const rev=ft.reduce((s,t)=>s+toCur(t.nt),0),com=ft.reduce((s,t)=>s+toCur(t.com),0);
  const byCat={};ft.forEach(t=>{const c=CSH[t.cat]||t.cat;byCat[c]=(byCat[c]||0)+toCur(t.nt)});
  const byC={};ft.forEach(t=>{const a=t.alias||t.name;byC[a]=(byC[a]||0)+toCur(t.nt)});

// ========== SHOP ==========
let shopSub="sales";
function shopSw(s){shopSub=s;render()}
function rShop(f){
  const el=document.getElementById("t-shop"),c$=cs();
  if(!WO.length){el.innerHTML='<div class="warn">WooCommerce не загрузился. Проверьте Vercel proxy и ключи API.</div>';return}

  // Filter orders by year
  const yr=f.yr;
  const allOrd=yr==="ALL"?WO:WO.filter(o=>(o.date_created||"").startsWith(yr));
  const completed=allOrd.filter(o=>o.status==="completed"||o.status==="processing");
  const cancelled=allOrd.filter(o=>o.status==="cancelled");
  const refunded=allOrd.filter(o=>o.status==="refunded");
  const pending=allOrd.filter(o=>o.status==="pending"||o.status==="on-hold");

  // Sub-tabs
  const tabs=`<div class="sh-tabs">
    <button class="sh-tab ${shopSub==="sales"?"on":""}" onclick="shopSw('sales')">Продажи</button>
    <button class="sh-tab ${shopSub==="products"?"on":""}" onclick="shopSw('products')">Продукты</button>
    <button class="sh-tab ${shopSub==="customers"?"on":""}" onclick="shopSw('customers')">Клиенты</button>
    <button class="sh-tab ${shopSub==="orders"?"on":""}" onclick="shopSw('orders')">Заказы</button>
  </div>`;

  if(shopSub==="sales") rShopSales(el,tabs,completed,allOrd,f,c$);
  else if(shopSub==="products") rShopProducts(el,tabs,completed,c$);
  else if(shopSub==="customers") rShopCustomers(el,tabs,completed,c$);
  else if(shopSub==="orders") rShopOrders(el,tabs,allOrd,completed,cancelled,refunded,pending,c$);
}

// ---- SHOP: Sales ----
function rShopSales(el,tabs,orders,allOrd,f,c$){
  const totalR=orders.reduce((s,o)=>s+parseFloat(o.total||0),0);
  const avg=orders.length?totalR/orders.length:0;
  const fopCut=totalR*(SETS.fopTax+SETS.fopBank)/100;

  // Period comparison
  const yr=f.yr;let prevOrders=[];
  if(yr!=="ALL"){
    const py=String(parseInt(yr)-1);
    prevOrders=WO.filter(o=>(o.date_created||"").startsWith(py)&&(o.status==="completed"||o.status==="processing"));
  }
  const prevR=prevOrders.reduce((s,o)=>s+parseFloat(o.total||0),0);
  const revGrow=prevR>0?((totalR-prevR)/prevR*100):0;
  const prevAvg=prevOrders.length?prevR/prevOrders.length:0;
  const avgGrow=prevAvg>0?((avg-prevAvg)/prevAvg*100):0;
  const cntGrow=prevOrders.length>0?((orders.length-prevOrders.length)/prevOrders.length*100):0;

  function cmpH(v){if(!v||!isFinite(v))return"";const cl=v>=0?"color:#10b981":"color:#ef4444";const ar=v>=0?"↑":"↓";return`<div class="cmp" style="${cl}">${ar}${Math.abs(v).toFixed(1)}%</div>`}

  // Monthly data
  const byM={};orders.forEach(o=>{const m=(o.date_created||"").substring(0,7);if(!byM[m])byM[m]={r:0,c:0,avg:0};byM[m].r+=parseFloat(o.total||0);byM[m].c++});
  Object.keys(byM).forEach(m=>{byM[m].avg=byM[m].c?byM[m].r/byM[m].c:0});
  const ms=Object.keys(byM).sort();

  // Weekly data (last 12 weeks)
  const byW={};orders.forEach(o=>{const d=new Date(o.date_created);const w=new Date(d);w.setDate(d.getDate()-d.getDay());const wk=w.toISOString().substring(0,10);if(!byW[wk])byW[wk]={r:0,c:0};byW[wk].r+=parseFloat(o.total||0);byW[wk].c++});
  const ws=Object.keys(byW).sort().slice(-12);

  // Payment methods
  const payM={};orders.forEach(o=>{const m=o.payment_method_title||o.payment_method||"Не указан";payM[m]=(payM[m]||0)+parseFloat(o.total||0)});
  const payS=Object.entries(payM).sort((a,b)=>b[1]-a[1]);
  const payTotal=payS.reduce((s,[,v])=>s+v,0);

  // UTM sources
  const srcs={};orders.forEach(o=>{const s=((o.meta_data||[]).find(x=>x.key==="_metorik_utm_source")||{}).value||"direct";srcs[s]=(srcs[s]||0)+1});
  const srcS=Object.entries(srcs).sort((a,b)=>b[1]-a[1]).slice(0,8);

  el.innerHTML=`${tabs}
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(100px,1fr))">
      <div class="sh-kpi"><div class="l">Выручка</div><div class="v g">${ff(toCur(totalR))}${c$}</div>${cmpH(revGrow)}</div>
      <div class="sh-kpi"><div class="l">Заказов</div><div class="v">${orders.length}</div>${cmpH(cntGrow)}</div>
      <div class="sh-kpi"><div class="l">Ср.чек</div><div class="v">${ff(toCur(avg))}${c$}</div>${cmpH(avgGrow)}</div>
      <div class="sh-kpi"><div class="l">ФОП налоги</div><div class="v rd">${ff(toCur(fopCut))}${c$}</div><div class="s">${SETS.fopTax}%+${SETS.fopBank}%</div></div>
      <div class="sh-kpi"><div class="l">Чистая</div><div class="v g">${ff(toCur(totalR-fopCut))}${c$}</div></div>
    </div>
    <div class="cc"><h3>Выручка и заказы помесячно</h3><canvas id="cs1" height="90"></canvas></div>
    <div class="row">
      <div class="cc"><h3>Средний чек (тренд)</h3><canvas id="csAvg" height="90"></canvas></div>
      <div class="cc"><h3>Выручка по неделям (12 нед)</h3><canvas id="csW" height="90"></canvas></div>
    </div>
    <div class="row">
      <div class="cc"><h3>Способы оплаты</h3>
        ${payS.map(([m,v])=>{const pct=payTotal>0?(v/payTotal*100):0;return`<div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;margin-bottom:4px"><span>${m}</span><span class="g" style="font-weight:600">${ff(toCur(v))}${c$} <span style="color:#7d8196;font-weight:400">(${pct.toFixed(0)}%)</span></span></div>`}).join("")}
      </div>
      <div class="cc"><h3>UTM источники</h3><table class="tbl"><tr><th>Источник</th><th class="r">Заказов</th><th class="r">%</th></tr>
        ${srcS.map(([s,c])=>`<tr><td>${s}</td><td class="r">${c}</td><td class="r" style="color:#7d8196">${(c/orders.length*100).toFixed(1)}%</td></tr>`).join("")}</table>
      </div>
    </div>`;

  // Charts
  dc("cs1");CH.cs1=new Chart(document.getElementById("cs1"),{type:"bar",data:{labels:ms,datasets:[{label:"Выручка",data:ms.map(m=>toCur(byM[m].r)),backgroundColor:"#10b981",borderRadius:2,yAxisID:"y"},{label:"Заказов",data:ms.map(m=>byM[m].c),type:"line",borderColor:"#f59e0b",pointRadius:2,pointBackgroundColor:"#f59e0b",borderWidth:1.5,yAxisID:"y1"}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{ticks:{color:"#7d8196",font:{size:8}},grid:{color:"#1e2130"}},y:{position:"left",ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}},y1:{position:"right",ticks:{color:"#f59e0b",font:{size:9}},grid:{display:false}}}}});

  dc("csAvg");CH.csAvg=new Chart(document.getElementById("csAvg"),{type:"line",data:{labels:ms,datasets:[{data:ms.map(m=>toCur(byM[m].avg)),borderColor:"#8b5cf6",backgroundColor:"rgba(139,92,246,.08)",fill:true,tension:.3,pointRadius:2,pointBackgroundColor:"#8b5cf6",borderWidth:1.5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7d8196",font:{size:8}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});

  dc("csW");CH.csW=new Chart(document.getElementById("csW"),{type:"bar",data:{labels:ws.map(w=>w.substring(5)),datasets:[{data:ws.map(w=>toCur(byW[w].r)),backgroundColor:"#3b82f6",borderRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7d8196",font:{size:8}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
}

// ---- SHOP: Products ----
function rShopProducts(el,tabs,orders,c$){
  // Product aggregation from orders
  const prods={};orders.forEach(o=>{(o.line_items||[]).forEach(li=>{if(parseFloat(li.total||0)>=0){const n=li.name||"?";const pid=li.product_id||0;if(!prods[pid])prods[pid]={n,r:0,q:0,orders:0};prods[pid].r+=parseFloat(li.total);prods[pid].q+=li.quantity||1;prods[pid].orders++}})});
  const prodArr=Object.values(prods).sort((a,b)=>b.r-a.r);
  const totalR=prodArr.reduce((s,p)=>s+p.r,0);
  const totalQ=prodArr.reduce((s,p)=>s+p.q,0);

  // ABC analysis
  let cum=0;
  prodArr.forEach(p=>{cum+=p.r;const pct=totalR>0?(cum/totalR*100):0;p.abc=pct<=80?"A":pct<=95?"B":"C"});
  const aCount=prodArr.filter(p=>p.abc==="A").length;
  const bCount=prodArr.filter(p=>p.abc==="B").length;
  const cCount=prodArr.filter(p=>p.abc==="C").length;

  // Category aggregation from WP products
  const cats={};orders.forEach(o=>{(o.line_items||[]).forEach(li=>{const wp=WP.find(p=>p.id===li.product_id);const catNames=wp&&wp.categories?wp.categories.map(c=>c.name):["Без категории"];catNames.forEach(cn=>{if(!cats[cn])cats[cn]={r:0,q:0};cats[cn].r+=parseFloat(li.total||0);cats[cn].q+=li.quantity||1})})});
  const catArr=Object.entries(cats).map(([n,d])=>({n,...d})).sort((a,b)=>b.r-a.r);

  // Stock status from WP products
  const inStock=WP.filter(p=>p.stock_status==="instock").length;
  const outStock=WP.filter(p=>p.stock_status==="outofstock").length;
  const lowStock=WP.filter(p=>p.stock_status==="onbackorder"||(p.stock_quantity!==null&&p.stock_quantity>0&&p.stock_quantity<=5)).length;
  const stockAlerts=WP.filter(p=>(p.stock_quantity!==null&&p.stock_quantity>0&&p.stock_quantity<=5)||p.stock_status==="outofstock").sort((a,b)=>(a.stock_quantity||0)-(b.stock_quantity||0));

  el.innerHTML=`${tabs}
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(100px,1fr))">
      <div class="sh-kpi"><div class="l">Позиций продано</div><div class="v">${prodArr.length}</div></div>
      <div class="sh-kpi"><div class="l">Всего шт</div><div class="v">${ff(totalQ)}</div></div>
      <div class="sh-kpi"><div class="l">В наличии</div><div class="v g">${inStock}</div></div>
      <div class="sh-kpi"><div class="l">Мало / Нет</div><div class="v rd">${lowStock} / ${outStock}</div></div>
    </div>
    <div class="row">
      <div class="cc"><h3>ABC-анализ</h3>
        <div style="display:flex;gap:6px;margin-bottom:8px;font-size:10px">
          <span style="color:#10b981;font-weight:600">A: ${aCount} поз (80% выр.)</span>
          <span style="color:#f59e0b;font-weight:600">B: ${bCount} поз (15%)</span>
          <span style="color:#7d8196;font-weight:600">C: ${cCount} поз (5%)</span>
        </div>
        <canvas id="csABC" height="100"></canvas>
      </div>
      <div class="cc"><h3>По категориям</h3><canvas id="csCat" height="100"></canvas></div>
    </div>
    <div class="cc"><h3>Топ товаров</h3><table class="tbl"><tr><th>ABC</th><th>Товар</th><th class="r">Выручка</th><th class="r">Шт</th><th class="r">Заказов</th><th class="r">% выр.</th></tr>
      ${prodArr.slice(0,20).map(p=>{const abcC=p.abc==="A"?"#10b981":p.abc==="B"?"#f59e0b":"#7d8196";return`<tr><td style="color:${abcC};font-weight:700">${p.abc}</td><td>${p.n.substring(0,30)}</td><td class="r g">${ff(toCur(p.r))}${c$}</td><td class="r">${p.q}</td><td class="r">${p.orders}</td><td class="r" style="color:#7d8196">${totalR>0?(p.r/totalR*100).toFixed(1):0}%</td></tr>`}).join("")}
    </table></div>
    ${stockAlerts.length?`<div class="cc"><h3>⚠ Stock Alerts</h3><table class="tbl"><tr><th>Товар</th><th class="r">Остаток</th><th class="r">Статус</th></tr>
      ${stockAlerts.slice(0,15).map(p=>{const sq=p.stock_quantity;const cls=p.stock_status==="outofstock"?"stock-out":sq<=5?"stock-low":"stock-in";return`<tr><td>${(p.name||"?").substring(0,35)}</td><td class="r">${sq!==null?sq:"—"}</td><td class="r"><span class="stock-badge ${cls}">${p.stock_status==="outofstock"?"Нет":sq<=5?"Мало":"Есть"}</span></td></tr>`}).join("")}
    </table></div>`:""}`; 

  // ABC chart
  dc("csABC");CH.csABC=new Chart(document.getElementById("csABC"),{type:"bar",data:{labels:prodArr.slice(0,15).map(p=>p.n.substring(0,12)),datasets:[{data:prodArr.slice(0,15).map(p=>toCur(p.r)),backgroundColor:prodArr.slice(0,15).map(p=>p.abc==="A"?"#10b981":p.abc==="B"?"#f59e0b":"#7d8196"),borderRadius:2}]},options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7d8196",font:{size:8},callback:v=>fm(v)},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:8}},grid:{display:false}}}}});

  // Category chart
  if(catArr.length){dc("csCat");CH.csCat=new Chart(document.getElementById("csCat"),{type:"doughnut",data:{labels:catArr.map(c=>c.n),datasets:[{data:catArr.map(c=>toCur(c.r)),backgroundColor:CC.concat(["#64748b","#0ea5e9","#d946ef"])}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#7d8196",font:{size:8},boxWidth:8,padding:4}}}}})}
}

// ---- SHOP: Customers ----
function rShopCustomers(el,tabs,orders,c$){
  // Group by billing email
  const custs={};orders.forEach(o=>{
    const email=(o.billing?.email||"").toLowerCase().trim();
    if(!email||email==="")return;
    if(!custs[email])custs[email]={name:(o.billing?.first_name||"")+" "+(o.billing?.last_name||""),email,orders:0,total:0,first:o.date_created,last:o.date_created,city:o.billing?.city||o.shipping?.city||"",country:o.billing?.country||""};
    custs[email].orders++;
    custs[email].total+=parseFloat(o.total||0);
    if(o.date_created<custs[email].first)custs[email].first=o.date_created;
    if(o.date_created>custs[email].last)custs[email].last=o.date_created;
  });
  const custArr=Object.values(custs);
  const totalCust=custArr.length;
  const returning=custArr.filter(c=>c.orders>1);
  const returningPct=totalCust>0?(returning.length/totalCust*100):0;
  const avgLTV=totalCust>0?custArr.reduce((s,c)=>s+c.total,0)/totalCust:0;
  const avgOrders=totalCust>0?custArr.reduce((s,c)=>s+c.orders,0)/totalCust:0;

  const firstByM={};custArr.forEach(c=>{const m=(c.first||"").substring(0,7);firstByM[m]=(firstByM[m]||0)+1});
  const ordByM={};orders.forEach(o=>{const m=(o.date_created||"").substring(0,7);if(!ordByM[m])ordByM[m]={total:0,ret:0};ordByM[m].total++;const email=(o.billing?.email||"").toLowerCase().trim();const cu=custs[email];if(cu&&cu.orders>1)ordByM[m].ret++});
  const cMs=Object.keys(ordByM).sort().slice(-12);

  el.innerHTML=`${tabs}
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(100px,1fr))">
      <div class="sh-kpi"><div class="l">Клиентов</div><div class="v">${totalCust}</div></div>
      <div class="sh-kpi"><div class="l">Повторные</div><div class="v" style="color:#8b5cf6">${returning.length}</div><div class="s">${returningPct.toFixed(1)}%</div></div>
      <div class="sh-kpi"><div class="l">Ср. LTV</div><div class="v">${ff(toCur(avgLTV))}${c$}</div></div>
      <div class="sh-kpi"><div class="l">Ср. заказов/кл</div><div class="v">${avgOrders.toFixed(1)}</div></div>
    </div>
    <div class="cc"><h3>Новые клиенты vs Повторные заказы</h3><canvas id="csCust" height="80"></canvas></div>
    <div class="row">
      <div class="cc"><h3>Топ клиентов (LTV)</h3><table class="tbl"><tr><th>Клиент</th><th class="r">LTV</th><th class="r">Зак.</th><th class="r">Ср.чек</th><th class="r">Город</th></tr>
        ${topLTV.map(c=>`<tr><td style="font-size:9px">${c.name.trim().substring(0,20)||c.email.substring(0,20)}</td><td class="r g">${ff(toCur(c.total))}${c$}</td><td class="r">${c.orders}</td><td class="r">${ff(toCur(c.total/c.orders))}${c$}</td><td class="r" style="color:#7d8196;font-size:9px">${c.city}</td></tr>`).join("")}
      </table></div>
      <div class="cc"><h3>География</h3>
        <table class="tbl"><tr><th>Страна</th><th class="r">Кл.</th></tr>
          ${topCountries.map(([c,n])=>`<tr><td>${c}</td><td class="r">${n}</td></tr>`).join("")}</table>
        <table class="tbl" style="margin-top:8px"><tr><th>Город</th><th class="r">Кл.</th></tr>
          ${topCities.map(([c,n])=>`<tr><td>${c}</td><td class="r">${n}</td></tr>`).join("")}</table>
      </div>
    </div>`;

  // New vs returning chart
  dc("csCust");CH.csCust=new Chart(document.getElementById("csCust"),{type:"bar",data:{labels:cMs,datasets:[{label:"Новые",data:cMs.map(m=>firstByM[m]||0),backgroundColor:"#3b82f6",borderRadius:2},{label:"Повт. заказы",data:cMs.map(m=>ordByM[m]?.ret||0),backgroundColor:"#8b5cf6",borderRadius:2}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{stacked:true,ticks:{color:"#7d8196",font:{size:8}},grid:{color:"#1e2130"}},y:{stacked:true,ticks:{color:"#7d8196",font:{size:9}},grid:{color:"#1e2130"}}}}});
}

// ---- SHOP: Orders ----
function rShopOrders(el,tabs,allOrd,completed,cancelled,refunded,pending,c$){
  const totalOrd=allOrd.length;
  const compR=completed.reduce((s,o)=>s+parseFloat(o.total||0),0);
  const refundR=refunded.reduce((s,o)=>s+parseFloat(o.total||0),0);
  const cancelRate=totalOrd>0?(cancelled.length/totalOrd*100):0;
  const refundRate=totalOrd>0?(refunded.length/totalOrd*100):0;

  // Status distribution
  const statuses={};allOrd.forEach(o=>{const s=o.status||"unknown";statuses[s]=(statuses[s]||0)+1});
  const statArr=Object.entries(statuses).sort((a,b)=>b[1]-a[1]);
  const statColors={"completed":"#10b981","processing":"#3b82f6","pending":"#f59e0b","on-hold":"#8b5cf6","cancelled":"#ef4444","refunded":"#ec4899","failed":"#64748b"};

  // Funnel: pending → processing → completed vs cancelled/refunded
  const funnel=[
    {l:"Всего",v:totalOrd,c:"#7d8196"},
    {l:"Processing",v:(statuses["processing"]||0)+(statuses["completed"]||0)+(statuses["refunded"]||0),c:"#3b82f6"},
    {l:"Completed",v:statuses["completed"]||0,c:"#10b981"},
    {l:"Cancelled",v:statuses["cancelled"]||0,c:"#ef4444"},
    {l:"Refunded",v:statuses["refunded"]||0,c:"#ec4899"}
  ];

  // Orders by status over time
  const byMSt={};allOrd.forEach(o=>{const m=(o.date_created||"").substring(0,7);const s=o.status;if(!byMSt[m])byMSt[m]={};byMSt[m][s]=(byMSt[m][s]||0)+1});
  const oMs=Object.keys(byMSt).sort().slice(-12);
  const mainSt=["completed","processing","cancelled","refunded"];

  // Recent orders table
  const recent=allOrd.sort((a,b)=>(b.date_created||"").localeCompare(a.date_created||"")).slice(0,20);

  el.innerHTML=`${tabs}
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(100px,1fr))">
      <div class="sh-kpi"><div class="l">Всего заказов</div><div class="v">${totalOrd}</div></div>
      <div class="sh-kpi"><div class="l">Выполнено</div><div class="v g">${completed.length}</div></div>
      <div class="sh-kpi"><div class="l">Refund rate</div><div class="v" style="color:#ec4899">${refundRate.toFixed(1)}%</div><div class="s">${refunded.length} зак · ${ff(toCur(refundR))}${c$}</div></div>
      <div class="sh-kpi"><div class="l">Cancel rate</div><div class="v rd">${cancelRate.toFixed(1)}%</div><div class="s">${cancelled.length} зак</div></div>
    </div>
    <div class="row">
      <div class="cc"><h3>Воронка заказов</h3>
        ${funnel.map(f=>{const w=totalOrd>0?(f.v/totalOrd*100):0;return`<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span>${f.l}</span><span style="font-weight:600">${f.v} <span style="color:#7d8196;font-weight:400">(${w.toFixed(0)}%)</span></span></div><div style="height:5px;background:#1e2130;border-radius:3px"><div style="height:100%;width:${w}%;background:${f.c};border-radius:3px"></div></div></div>`}).join("")}
      </div>
      <div class="cc"><h3>Статусы</h3><canvas id="csStatus" height="100"></canvas></div>
    </div>
    <div class="cc"><h3>Заказы по статусам (помесячно)</h3><canvas id="csOrdM" height="80"></canvas></div>
    <div class="cc"><h3>Последние заказы</h3><table class="tbl"><tr><th>#</th><th>Дата</th><th>Клиент</th><th class="r">Сумма</th><th class="r">Статус</th></tr>
      ${recent.map(o=>{const sc=statColors[o.status]||"#7d8196";return`<tr><td style="color:#7d8196">${o.id}</td><td style="font-size:9px">${(o.date_created||"").substring(0,10)}</td><td style="font-size:9px">${(o.billing?.first_name||"")} ${(o.billing?.last_name||"").substring(0,1)}.</td><td class="r g">${ff(toCur(parseFloat(o.total||0)))}${c$}</td><td class="r"><span style="color:${sc};font-weight:600;font-size:9px">${o.status}</span></td></tr>`}).join("")}
    </table></div>`;

  // Status doughnut
  dc("csStatus");CH.csStatus=new Chart(document.getElementById("csStatus"),{type:"doughnut",data:{labels:statArr.map(([s])=>s),datasets:[{data:statArr.map(([,v])=>v),backgroundColor:statArr.map(([s])=>statColors[s]||"#64748b")}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#7d8196",font:{size:8},boxWidth:8,padding:4}}}}});

  // Stacked bar by month
  dc("csOrdM");CH.csOrdM=new Chart(document.getElementById("csOrdM"),{type:"bar",data:{labels:oMs,datasets:mainSt.map(s=>({label:s,data:oMs.map(m=>byMSt[m]?.[s]||0),backgroundColor:statColors[s]||"#64748b",borderRadius:1}))},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{stacked:true,ticks:{color:"#7d8196",font:{size:8}},grid:{color:"#1e2130"}},y:{stacked:true,ticks:{color:"#7d8196",font:{size:9}},grid:{color:"#1e2130"}}}}});
}

// ========== STOCK ==========
function rStock(){
  const el=document.getElementById("t-stock");
  const it=SK.map(s=>{const w=gv(s,"вино")||"";const vi=gv(s,"урожай")||"";const st=pn(gv(s,"остаток")||"0");const so=pn(gv(s,"продано")||"0");const av=pn(gv(s,"сред")||"0");const mr=gv(s,"запас")||"";const mo=mr&&mr!=="N/A"?parseFloat(mr):null;return{w,vi,st,so,av,mo}}).filter(s=>s.st>0);
  it.sort((a,b)=>{if(a.mo===null)return 1;if(b.mo===null)return-1;return a.mo-b.mo});
  const tb=it.reduce((s,i)=>s+i.st,0),lo=it.filter(i=>i.mo!==null&&i.mo<2).length,lo3=it.filter(i=>i.mo!==null&&i.mo<3).length,sk=it.filter(i=>i.mo!==null&&i.mo>15).length;
  el.innerHTML=`
    <div class="info">Склад: статичные данные. Для live подключите IMPORTRANGE из 1С.</div>
    <div class="kpis"><div class="kpi"><div class="l">Позиций</div><div class="v">${it.length}</div></div><div class="kpi"><div class="l">Бутылок</div><div class="v">${ff(tb)}</div></div><div class="kpi"><div class="l">Крит.</div><div class="v rd">${lo}</div><div class="s">&lt;2м</div></div><div class="kpi"><div class="l">Заканч.</div><div class="v" style="color:#e11d48">${lo3}</div><div class="s">&lt;3м</div></div><div class="kpi"><div class="l">Застр.</div><div class="v" style="color:#f59e0b">${sk}</div><div class="s">&gt;15м</div></div></div>
    <div class="lgd"><span><i style="background:#ef4444"></i>&lt;2м</span><span><i style="background:#e11d48"></i>&lt;3м</span><span><i style="background:#f59e0b"></i>Застр.</span><span><i style="background:#10b981"></i>Норма</span></div>
    ${it.map(i=>{const t=i.st+i.so,p=t>0?(i.st/t*100):0;const cr=i.mo!==null&&i.mo<2;const lw=i.mo!==null&&i.mo<3;const st=i.mo!==null&&i.mo>15;const cl=cr||lw?"low":st?"stk":"";const co=cr?"#ef4444":lw?"#e11d48":st?"#f59e0b":"#10b981";return'<div class="si '+cl+'"><div class="top"><span class="nm">'+i.w+' '+i.vi+'</span><span style="color:'+co+';font-weight:600">'+ff(i.st)+' · '+(i.mo!==null?i.mo.toFixed(1)+'м':'N/A')+'</span></div><div class="bar"><div class="bf" style="width:'+p+'%;background:'+co+'"></div></div><div class="bot"><span>Продано: '+ff(i.so)+'</span><span>~'+i.av+'/мес</span></div></div>'}).join("")}`;
}

// ========== CASH FLOW ==========
function rCash(f){
  const el=document.getElementById("t-cash"),c$=cs();
  const uahB=pn(gv(BL.find(b=>gv(b,"валют")==="UAH")||{},"баланс")||"0");
  const eurB=pn(gv(BL.find(b=>gv(b,"валют")==="EUR")||{},"баланс")||"0");
  const usdB=pn(gv(BL.find(b=>gv(b,"валют")==="USD")||{},"баланс")||"0");
  const totalB=uahB+eurB*FX.EUR+usdB*FX.USD;
  const totalEUR=uahB/FX.EUR+eurB+usdB*FX.USD/FX.EUR;
  const totalUSD=uahB/FX.USD+eurB*FX.EUR/FX.USD+usdB;
  const ft=f.yr!=="ALL"?T.filter(t=>t.yr===f.yr):T;
  const byM={};ft.forEach(t=>{if(!byM[t.ym])byM[t.ym]={i:0,o:0};if(t.amt>0)byM[t.ym].i+=t.amt;else byM[t.ym].o+=Math.abs(t.amt)});
  const ms=Object.keys(byM).sort();const netto=ms.map(m=>byM[m].i-byM[m].o);
  // Cumulative
  let cum=0;const cumData=netto.map(n=>{cum+=n;return cum});
  // Last dates
  const lastD={};T.forEach(t=>{if(!lastD[t.src]||t.ym>lastD[t.src])lastD[t.src]=t.ym});

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Всего ₴</div><div class="v" style="color:#f59e0b">${ff(totalB)} ₴</div></div>
      <div class="kpi"><div class="l">Всего €</div><div class="v" style="color:#3b82f6">${ff(totalEUR)} €</div></div>
      <div class="kpi"><div class="l">Всего $</div><div class="v" style="color:#10b981">${ff(totalUSD)} $</div></div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="l">₴ счёт</div><div class="v">${ff(uahB)}</div></div>
      <div class="kpi"><div class="l">€ счёт</div><div class="v">${ff(eurB)}</div><div class="s">=${ff(eurB*FX.EUR)}₴</div></div>
      <div class="kpi"><div class="l">$ счёт</div><div class="v">${ff(usdB)}</div><div class="s">=${ff(usdB*FX.USD)}₴</div></div>
    </div>
    <div class="cc"><h3>Входящие vs Исходящие (брутто)</h3><canvas id="cc1" height="100"></canvas></div>
    <div class="row">
      <div class="cc"><h3>Нетто помесячно</h3><canvas id="cc2" height="100"></canvas></div>
      <div class="cc"><h3>Кумулятивный нетто</h3><canvas id="cc3" height="100"></canvas></div>
    </div>
    <div class="cc"><h3>Последние обновления</h3><table class="tbl"><tr><th>Источник</th><th class="r">Данные до</th></tr>${Object.entries(lastD).sort().map(([s,d])=>'<tr><td>'+s+'</td><td class="r">'+d+'</td></tr>').join("")}</table>
    <p style="font-size:9px;color:#7d8196;margin-top:6px">€1=${FX.EUR.toFixed(2)}₴ · $1=${FX.USD.toFixed(2)}₴ (НБУ)</p></div>`;
  dc("cc1");CH.cc1=new Chart(document.getElementById("cc1"),{type:"bar",data:{labels:ms,datasets:[{label:"Вход",data:ms.map(m=>byM[m].i),backgroundColor:"#10b981",borderRadius:2},{label:"Выход",data:ms.map(m=>byM[m].o),backgroundColor:"rgba(239,68,68,.5)",borderRadius:2}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:9},boxWidth:9}}},scales:{x:{ticks:{color:"#7d8196",font:{size:7},maxTicksLimit:14},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
  dc("cc2");CH.cc2=new Chart(document.getElementById("cc2"),{type:"bar",data:{labels:ms,datasets:[{data:netto,backgroundColor:netto.map(v=>v>=0?"#10b981":"#ef4444"),borderRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7d8196",font:{size:7},maxTicksLimit:14},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
  dc("cc3");CH.cc3=new Chart(document.getElementById("cc3"),{type:"line",data:{labels:ms,datasets:[{data:cumData,borderColor:"#8b5cf6",backgroundColor:"rgba(139,92,246,.08)",fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>ff(c.raw)+" ₴"}}},scales:{x:{ticks:{color:"#7d8196",font:{size:7},maxTicksLimit:14},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
}

// ========== UNRECOGNIZED ==========
function rUnrec(){
  const el=document.getElementById("t-unrec");
  const unrec=T.filter(t=>t.cat==="???"||t.cat===""||t.cat.includes("???"));
  const byA={};unrec.forEach(t=>{const a=t.alias||t.name||"(пусто)";if(!byA[a])byA[a]={cnt:0,amt:0,src:t.src};byA[a].cnt++;byA[a].amt+=t.amt});
  const sorted=Object.entries(byA).map(([n,d])=>({n,...d})).sort((a,b)=>Math.abs(b.amt)-Math.abs(a.amt));
  el.innerHTML=`
    ${sorted.length?'<div class="warn">'+sorted.length+' нераспознанных на '+ff(Math.abs(sorted.reduce((s,x)=>s+x.amt,0)))+' ₴. Обновите workerNEW в BW_accounts.</div>':'<div class="info">Все контрагенты распознаны ✓</div>'}
    <div class="cc"><h3>Нераспознанные</h3><table class="tbl"><tr><th>Контрагент</th><th class="r">Источник</th><th class="r">Сумма</th><th class="r">Опер.</th></tr>
      ${sorted.map(x=>'<tr><td>'+x.n.substring(0,35)+'</td><td class="r" style="color:#7d8196">'+x.src+'</td><td class="r '+(x.amt>0?"g":"rd")+'">'+ff(x.amt)+' ₴</td><td class="r">'+x.cnt+'</td></tr>').join("")}</table></div>`;
}
