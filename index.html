<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beykush Winery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e13;color:#e4e5ea;font-family:'DM Sans',sans-serif;max-width:960px;margin:0 auto;padding:16px 20px 40px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.hdr .dot{width:8px;height:8px;border-radius:50%;background:#9f1239}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:-.5px}
.hdr .badge{font-size:10px;color:#7d8196;background:#151821;padding:2px 8px;border-radius:12px}
.hdr .st{font-size:10px;margin-left:auto}
.sub{font-size:11px;color:#7d8196;margin-bottom:14px}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.tab{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;background:#151821;color:#7d8196;transition:all .15s}
.tab.on{background:#9f1239;color:#fff}
.yf{margin-left:auto;padding:5px 10px;border-radius:6px;border:1px solid #232738;background:#151821;color:#e4e5ea;font-size:11px;font-family:inherit}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:#151821;border-radius:8px;padding:12px 14px;border:1px solid #232738}
.kpi .l{font-size:10px;color:#7d8196;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.kpi .v{font-size:20px;font-weight:700}
.kpi .s{font-size:10px;color:#7d8196;margin-top:2px}
.cc{background:#151821;border-radius:8px;padding:14px;border:1px solid #232738;margin-bottom:12px}
.cc h3{font-size:11px;font-weight:600;color:#7d8196;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.row{grid-template-columns:1fr}}
.si{margin-bottom:6px;padding:8px 10px;background:#151821;border-radius:6px;border:1px solid #232738}
.si.low{border-color:rgba(239,68,68,.3)}.si.stk{border-color:rgba(245,158,11,.3)}
.si .top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.si .nm{font-weight:600}.si .bar{height:4px;background:#232738;border-radius:2px;overflow:hidden}
.si .bf{height:100%;border-radius:2px}.si .bot{display:flex;justify-content:space-between;margin-top:3px;font-size:9px;color:#7d8196}
.lgd{display:flex;gap:10px;margin-bottom:8px;font-size:10px;color:#7d8196}
.lgd i{width:6px;height:6px;border-radius:2px;display:inline-block;margin-right:3px}
.mg{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #232738;font-size:12px}
.mg:last-child{border:none}.mg .n{font-weight:600}.mg .s{font-size:10px;color:#7d8196}
.mg .v{font-weight:600;color:#10b981;text-align:right}
.er{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(35,39,56,.4);font-size:11px}
.er .c{font-weight:500;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.er .a{color:#ef4444;font-weight:600}
.ld{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column}
.ld h2{font-size:16px;margin-bottom:6px}.ld p{font-size:12px;color:#7d8196}
.hidden{display:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="dot"></div><h1>BEYKUSH WINERY</h1><span class="badge">Live</span>
  <span class="st" id="status" style="color:#f59e0b">⏳ Loading...</span>
</div>
<div class="sub" id="subtitle">Загрузка...</div>
<div class="tabs">
  <button class="tab on" onclick="sw('pl',this)">P&L</button>
  <button class="tab" onclick="sw('sales',this)">Продажи</button>
  <button class="tab" onclick="sw('exp',this)">Расходы</button>
  <button class="tab" onclick="sw('stock',this)">Склад</button>
  <select class="yf" id="yf" onchange="render()"><option value="ALL">Все годы</option></select>
</div>
<div id="ld" class="ld"><h2>Загрузка данных из Google Sheets...</h2><p>Dashboard_Data + 3_Stock + 6_Balances</p></div>
<div id="t-pl" class="hidden"></div>
<div id="t-sales" class="hidden"></div>
<div id="t-exp" class="hidden"></div>
<div id="t-stock" class="hidden"></div>

<script>
const SID="1K52LGIjxaQg1LfmjdVKXA0-wMh0MVUo16q-Z6BiNOsQ";
const IGNORE=["#ignore","Конвертація","ІГНОР!!!","Банк???","Банк, Еквайринг"];
let T=[],SK=[],BL=[],CH={};

function pn(s){if(!s||s==="")return 0;s=String(s).trim();let neg=false;if(s.startsWith("(")&&s.endsWith(")")){neg=true;s=s.slice(1,-1)}if(s.startsWith("-")){neg=true;s=s.slice(1)}s=s.replace(/[₴$€\s]/g,"").replace(/,/g,"");let n=parseFloat(s);if(isNaN(n))return 0;return neg?-n:n}
const fm=n=>{if(!n&&n!==0)return"—";const a=Math.abs(n);if(a>=1e6)return(n/1e6).toFixed(1)+"M";if(a>=1e3)return(n/1e3).toFixed(0)+"K";return n.toFixed(0)};
const ff=n=>n?new Intl.NumberFormat("uk-UA",{maximumFractionDigits:0}).format(n):"0";
function gv(obj,search){for(const k of Object.keys(obj)){if(k.trim().toLowerCase().startsWith(search.toLowerCase()))return obj[k]}return""}

async function csv(sh){
  const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sh)}`);
  const t=await r.text();const rows=[];let c=[],q=false,f="";
  for(let i=0;i<t.length;i++){const x=t[i];if(q){if(x==='"'&&t[i+1]==='"'){f+='"';i++}else if(x==='"')q=false;else f+=x}else{if(x==='"')q=true;else if(x===','){c.push(f);f=""}else if(x==='\n'||(x==='\r'&&t[i+1]==='\n')){c.push(f);f="";rows.push(c);c=[];if(x==='\r')i++}else f+=x}}
  if(f||c.length){c.push(f);rows.push(c)}if(rows.length<2)return[];const h=rows[0].map(x=>x.trim());
  return rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>{o[k]=r[i]!==undefined?r[i].trim():""});return o})
}

async function load(){
  try{
    const[t,s,b]=await Promise.all([csv("Dashboard_Data"),csv("3_Stock"),csv("6_Balances")]);
    let raw=t.map(x=>{
      const mo=String(pn(gv(x,"month"))||gv(x,"month")||"");
      return{mo,money:gv(x,"money")||"",name:gv(x,"name")||"",alias:gv(x,"alias")||"",cat:gv(x,"category")||"",geo:gv(x,"geo")||"",mgr:gv(x,"менеджер")||gv(x,"manager")||"",amt:pn(gv(x,"sum_uah")),com:pn(gv(x,"commission")),sumMoney:pn(gv(x,"sum_money")),src:gv(x,"source")||""};
    });
    T=raw.filter(x=>{const m=parseInt(x.mo);return m>=202001&&!IGNORE.includes(x.cat)&&x.cat!==""});
    T.forEach(x=>{x.yr=String(x.mo).substring(0,4);x.mm=String(x.mo).substring(4,6);x.ym=x.yr+"-"+x.mm;x.tp=x.amt>0?"Доход":"Расход"});
    SK=s;BL=b;
    const yrs=[...new Set(T.map(x=>x.yr))].filter(y=>y>="2020"&&y<="2030").sort();
    const sel=document.getElementById("yf");sel.innerHTML='<option value="ALL">Все годы</option>';
    yrs.forEach(y=>{const o=document.createElement("option");o.value=y;o.textContent=y;sel.appendChild(o)});
    document.getElementById("status").textContent="● Connected";document.getElementById("status").style.color="#10b981";
    document.getElementById("subtitle").textContent=ff(T.length)+" операций · Google Sheets live";
    document.getElementById("ld").classList.add("hidden");render();
  }catch(e){document.getElementById("status").textContent="● Ошибка";document.getElementById("status").style.color="#ef4444";document.getElementById("ld").innerHTML='<h2 style="color:#ef4444">Ошибка</h2><p>'+e.message+'</p>'}
}

function sw(id,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');['pl','sales','exp','stock'].forEach(t=>document.getElementById('t-'+t).classList.add('hidden'));document.getElementById('t-'+id).classList.remove('hidden');render()}
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id]}}

const CHS=["Продаж, Мережі","Продаж, Horeca & Shops","Продаж, Експорт","Доход, ФОП","Продаж, Корп клієнт","Доход, каса БВ","Продаж,  Дістрібʼютор Укр","Продаж, Інтернет магазини","Продаж, на виноробні"];
const CSH={"Продаж, Мережі":"Сети","Продаж, Horeca & Shops":"HoReCa","Продаж, Експорт":"Экспорт","Доход, ФОП":"ФОП","Продаж, Корп клієнт":"Корп","Доход, каса БВ":"Каса","Продаж,  Дістрібʼютор Укр":"Дистр","Продаж, Інтернет магазини":"Инет","Продаж, на виноробні":"Виноробня"};
const CC=["#e11d48","#8b5cf6","#10b981","#f59e0b","#3b82f6","#ec4899","#14b8a6","#6366f1","#a855f7"];
const CO={responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:10},boxWidth:10,padding:8}}},scales:{x:{ticks:{color:"#7d8196",font:{size:10}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:10},callback:v=>fm(v)},grid:{color:"#1e2130"}}}};
const MONTHS=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

function render(){rPL();rSales();rExp();rStock()}

function rPL(){
  const el=document.getElementById("t-pl");
  const yr=document.getElementById("yf").value;
  const allYrs=[...new Set(T.map(x=>x.yr))].sort();

  // Determine current year for KPI
  const selY=yr!=="ALL"?yr:allYrs[allYrs.length-1]||"2026";
  const prevY=String(parseInt(selY)-1);

  // For YTD comparison: find max month in selected year
  const selMonths=T.filter(t=>t.yr===selY).map(t=>t.mm);
  const maxMM=selMonths.length?Math.max(...selMonths.map(Number)):12;

  // Revenue/expenses for selected year
  const selT=T.filter(t=>t.yr===selY);
  const selRev=selT.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.amt,0);
  const selExp=selT.filter(t=>t.tp==="Расход").reduce((s,t)=>s+t.amt,0);
  const selProfit=selRev+selExp;
  const selMargin=selRev?(selProfit/selRev*100).toFixed(1):"0";

  // Previous year YTD (same months only)
  const prevT=T.filter(t=>t.yr===prevY&&parseInt(t.mm)<=maxMM);
  const prevRev=prevT.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.amt,0);
  const gr=prevRev?((selRev-prevRev)/prevRev*100).toFixed(1):"0";
  const ytdLabel=maxMM<12?` (${MONTHS[maxMM-1]})`:"";

  // Totals all time
  const tr=T.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.amt,0);
  const te=T.filter(t=>t.tp==="Расход").reduce((s,t)=>s+t.amt,0);

  // Balances
  const uah=BL.find(b=>gv(b,"валют")==="UAH"||gv(b,"currency")==="UAH");
  const eur=BL.find(b=>gv(b,"валют")==="EUR"||gv(b,"currency")==="EUR");
  const usd=BL.find(b=>gv(b,"валют")==="USD"||gv(b,"currency")==="USD");
  const getBal=r=>r?pn(gv(r,"баланс")||gv(r,"balance")||"0"):0;

  // Annual bar chart data
  const barsD=allYrs.map(y=>{const yt=T.filter(t=>t.yr===y);const rev=yt.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.amt,0);const exp=yt.filter(t=>t.tp==="Расход").reduce((s,t)=>s+t.amt,0);return{y,rev,exp:Math.abs(exp),pr:rev+exp}});

  // Monthly comparison: selected year vs previous year
  const mRevSel={},mRevPrev={};
  T.filter(t=>t.yr===selY&&t.tp==="Доход").forEach(t=>{mRevSel[t.mm]=(mRevSel[t.mm]||0)+t.amt});
  T.filter(t=>t.yr===prevY&&t.tp==="Доход").forEach(t=>{mRevPrev[t.mm]=(mRevPrev[t.mm]||0)+t.amt});

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Выручка ${selY}${ytdLabel}</div><div class="v" style="color:#10b981">${fm(selRev)} ₴</div><div class="s">${gr>0?"+":""}${gr}% vs ${prevY}${ytdLabel}</div></div>
      <div class="kpi"><div class="l">Прибыль ${selY}</div><div class="v" style="color:${selProfit>0?'#10b981':'#ef4444'}">${fm(selProfit)} ₴</div><div class="s">Маржа ${selMargin}%</div></div>
      <div class="kpi"><div class="l">Всего</div><div class="v">${fm(tr)} ₴</div><div class="s">Расходы: ${fm(Math.abs(te))} ₴</div></div>
      <div class="kpi"><div class="l">Баланс</div><div class="v" style="color:#f59e0b">${uah?ff(getBal(uah)):"—"} ₴</div><div class="s">${eur?"€"+ff(getBal(eur)):""} · ${usd?"$"+ff(getBal(usd)):""}</div></div>
    </div>
    <div class="cc"><h3>Выручка · Расходы · Прибыль по годам</h3><canvas id="c1" height="120"></canvas></div>
    <div class="cc"><h3>Выручка помесячно: ${selY} vs ${prevY}</h3><canvas id="c2" height="100"></canvas></div>`;

  dc("c1");CH.c1=new Chart(document.getElementById("c1"),{type:"bar",data:{labels:allYrs,datasets:[
    {label:"Выручка",data:barsD.map(x=>x.rev),backgroundColor:"#10b981",borderRadius:3},
    {label:"Расходы",data:barsD.map(x=>x.exp),backgroundColor:"rgba(239,68,68,.6)",borderRadius:3},
    {label:"Прибыль",data:barsD.map(x=>x.pr),backgroundColor:"#8b5cf6",borderRadius:3}
  ]},options:CO});

  // Monthly chart with two years overlay
  const monthNums=["01","02","03","04","05","06","07","08","09","10","11","12"];
  dc("c2");CH.c2=new Chart(document.getElementById("c2"),{type:"bar",data:{
    labels:MONTHS,
    datasets:[
      {label:selY,data:monthNums.map(m=>mRevSel[m]||0),backgroundColor:"#10b981",borderRadius:3},
      {label:prevY,data:monthNums.map(m=>mRevPrev[m]||0),backgroundColor:"rgba(139,92,246,.5)",borderRadius:3}
    ]
  },options:{responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:10},boxWidth:10,padding:8}},tooltip:{callbacks:{label:c=>c.dataset.label+": "+ff(c.raw)+" ₴"}}},scales:{x:{ticks:{color:"#7d8196",font:{size:10}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
}

function rSales(){
  const el=document.getElementById("t-sales");const yr=document.getElementById("yf").value;
  const ft=T.filter(t=>t.tp==="Доход"&&(yr==="ALL"||t.yr===yr));
  const pd=CHS.map((c,i)=>({n:CSH[c]||c,v:ft.filter(t=>t.cat===c).reduce((s,t)=>s+t.amt,0)})).filter(x=>x.v>5000);
  const bm={};ft.forEach(t=>{const m=t.mgr;if(!m||m==="-"||m==="="||m===""||m==="0")return;if(!bm[m])bm[m]={s:0,c:0};bm[m].s+=t.amt;bm[m].c+=t.com});
  const ms=Object.entries(bm).map(([n,d])=>({n,...d})).sort((a,b)=>b.s-a.s).slice(0,6);
  const chYrs=[...new Set(T.filter(t=>t.tp==="Доход").map(t=>t.yr))].sort();
  const chData=chYrs.map(y=>{const yt=T.filter(t=>t.yr===y&&t.tp==="Доход");const o={year:y};CHS.forEach(c=>{o[CSH[c]||c]=yt.filter(t=>t.cat===c).reduce((s,t)=>s+t.amt,0)});return o});
  el.innerHTML=`
    <div class="cc"><h3>Каналы по годам</h3><canvas id="c5" height="140"></canvas>
      <div style="display:flex;flex-wrap:wrap;gap:3px 10px;margin-top:8px">${CHS.map((c,i)=>'<span style="display:flex;align-items:center;gap:4px;font-size:9px;color:#7d8196"><i style="width:6px;height:6px;border-radius:2px;display:inline-block;background:'+CC[i]+'"></i>'+CSH[c]+'</span>').join("")}</div>
    </div>
    <div class="row">
      <div class="cc"><h3>Каналы ${yr!=="ALL"?yr:chYrs[chYrs.length-1]||""}</h3><canvas id="c3" height="200"></canvas></div>
      <div class="cc"><h3>Менеджеры ${yr!=="ALL"?yr:""}</h3>${ms.map(m=>'<div class="mg"><div><div class="n">'+m.n+'</div><div class="s">КМ: '+(m.s?(m.c/m.s*100).toFixed(1):0)+'%</div></div><div><div class="v">'+ff(m.s)+' ₴</div><div class="s">'+ff(m.c)+' ₴</div></div></div>').join("")}</div>
    </div>`;
  dc("c5");CH.c5=new Chart(document.getElementById("c5"),{type:"bar",data:{labels:chYrs,datasets:CHS.map((c,i)=>({label:CSH[c],data:chData.map(d=>d[CSH[c]]||0),backgroundColor:CC[i],borderRadius:2}))},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:"#7d8196",font:{size:10}},grid:{color:"#1e2130"}},y:{stacked:true,ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
  dc("c3");CH.c3=new Chart(document.getElementById("c3"),{type:"doughnut",data:{labels:pd.map(x=>x.n),datasets:[{data:pd.map(x=>x.v),backgroundColor:CC.slice(0,pd.length),borderWidth:0}]},
    options:{responsive:true,cutout:"55%",plugins:{legend:{position:"bottom",labels:{color:"#7d8196",font:{size:9},boxWidth:8,padding:6}},tooltip:{callbacks:{label:c=>c.label+": "+ff(c.raw)+" ₴"}}}}});
}

function rExp(){
  const el=document.getElementById("t-exp");const yr=document.getElementById("yf").value;
  const ft=yr==="ALL"?T.filter(t=>t.tp==="Расход"):T.filter(t=>t.tp==="Расход"&&t.yr===yr);
  const bc={};ft.forEach(t=>{const c=t.cat||"???";bc[c]=(bc[c]||0)+t.amt});
  const so=Object.entries(bc).map(([c,v])=>({c,a:v})).sort((a,b)=>a.a-b.a).slice(0,15);
  el.innerHTML=`
    <div class="cc"><h3>Топ расходов ${yr!=="ALL"?yr:""}</h3><canvas id="c4" height="${Math.max(140,so.length*16)}"></canvas></div>
    <div class="cc"><h3>Детализация</h3>${so.map(e=>'<div class="er"><span class="c">'+e.c+'</span><span class="a">'+ff(Math.abs(e.a))+' ₴</span></div>').join("")}</div>`;
  dc("c4");CH.c4=new Chart(document.getElementById("c4"),{type:"bar",data:{labels:so.map(e=>e.c.substring(0,25)),datasets:[{data:so.map(e=>Math.abs(e.a)),backgroundColor:"rgba(239,68,68,.55)",borderRadius:2}]},
    options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>ff(c.raw)+" ₴"}}},scales:{x:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9}},grid:{display:false}}}}});
}

function rStock(){
  const el=document.getElementById("t-stock");
  const it=SK.map(s=>{const w=gv(s,"вино")||gv(s,"wine")||"";const vi=gv(s,"урожай")||gv(s,"vintage")||"";const st=pn(gv(s,"остаток")||gv(s,"stock")||"0");const so=pn(gv(s,"продано")||gv(s,"sold")||"0");const av=pn(gv(s,"сред")||"0");const moRaw=gv(s,"запас")||"";const mo=moRaw&&moRaw!=="N/A"?parseFloat(moRaw):null;return{w,vi,st,so,av,mo}}).filter(s=>s.st>0);
  it.sort((a,b)=>{if(a.mo===null)return 1;if(b.mo===null)return-1;return a.mo-b.mo});
  const tb=it.reduce((s,i)=>s+i.st,0),lo=it.filter(i=>i.mo!==null&&i.mo<3).length,sk=it.filter(i=>i.mo!==null&&i.mo>15).length;
  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Позиций</div><div class="v">${it.length}</div></div>
      <div class="kpi"><div class="l">Бутылок</div><div class="v">${ff(tb)}</div></div>
      <div class="kpi"><div class="l">Заканчив.</div><div class="v" style="color:#ef4444">${lo}</div><div class="s">&lt;3 мес</div></div>
      <div class="kpi"><div class="l">Застряли</div><div class="v" style="color:#f59e0b">${sk}</div><div class="s">&gt;15 мес</div></div>
    </div>
    <div class="lgd"><span><i style="background:#ef4444"></i>Заканч.</span><span><i style="background:#f59e0b"></i>Застряло</span><span><i style="background:#10b981"></i>Норма</span></div>
    ${it.map(i=>{const t=i.st+i.so,p=t>0?(i.st/t*100):0;const cl=i.mo!==null&&i.mo<3?"low":i.mo!==null&&i.mo>15?"stk":"";const co=cl==="low"?"#ef4444":cl==="stk"?"#f59e0b":"#10b981";
      return'<div class="si '+cl+'"><div class="top"><span class="nm">'+i.w+' '+i.vi+'</span><span style="color:'+co+';font-weight:600">'+ff(i.st)+' · '+(i.mo!==null?i.mo.toFixed(1)+'м':'N/A')+'</span></div><div class="bar"><div class="bf" style="width:'+p+'%;background:'+co+'"></div></div><div class="bot"><span>Продано: '+ff(i.so)+'</span><span>~'+i.av+'/мес</span></div></div>'}).join("")}`;
}

load();
</script>
</body>
</html>
