<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beykush Winery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e13;color:#e4e5ea;font-family:'DM Sans',sans-serif;max-width:960px;margin:0 auto;padding:16px 20px 40px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.hdr .dot{width:8px;height:8px;border-radius:50%;background:#9f1239}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:-.5px}
.hdr .badge{font-size:10px;color:#7d8196;background:#151821;padding:2px 8px;border-radius:12px}
.hdr .st{font-size:10px;margin-left:auto}
.sub{font-size:11px;color:#7d8196;margin-bottom:14px}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.tab{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;background:#151821;color:#7d8196;transition:all .15s}
.tab.on{background:#9f1239;color:#fff}
.yf{margin-left:auto;padding:5px 10px;border-radius:6px;border:1px solid #232738;background:#151821;color:#e4e5ea;font-size:11px;font-family:inherit}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:#151821;border-radius:8px;padding:12px 14px;border:1px solid #232738}
.kpi .l{font-size:10px;color:#7d8196;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.kpi .v{font-size:20px;font-weight:700}
.kpi .s{font-size:10px;color:#7d8196;margin-top:2px}
.cc{background:#151821;border-radius:8px;padding:14px;border:1px solid #232738;margin-bottom:12px}
.cc h3{font-size:11px;font-weight:600;color:#7d8196;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.row{grid-template-columns:1fr}}
.si{margin-bottom:6px;padding:8px 10px;background:#151821;border-radius:6px;border:1px solid #232738}
.si.low{border-color:rgba(239,68,68,.3)}.si.stk{border-color:rgba(245,158,11,.3)}
.si .top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.si .nm{font-weight:600}.si .bar{height:4px;background:#232738;border-radius:2px;overflow:hidden}
.si .bf{height:100%;border-radius:2px}.si .bot{display:flex;justify-content:space-between;margin-top:3px;font-size:9px;color:#7d8196}
.lgd{display:flex;gap:10px;margin-bottom:8px;font-size:10px;color:#7d8196}
.lgd i{width:6px;height:6px;border-radius:2px;display:inline-block;margin-right:3px}
.mg{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #232738;font-size:12px}
.mg:last-child{border:none}.mg .n{font-weight:600}.mg .s{font-size:10px;color:#7d8196}
.mg .v{font-weight:600;color:#10b981;text-align:right}
.er{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(35,39,56,.4);font-size:11px}
.er .c{font-weight:500;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.er .a{color:#ef4444;font-weight:600}
.ld{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column}
.ld h2{font-size:16px;margin-bottom:6px}.ld p{font-size:12px;color:#7d8196}
.hidden{display:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="dot"></div><h1>BEYKUSH WINERY</h1><span class="badge">Live</span>
  <span class="st" id="status" style="color:#f59e0b">⏳ Loading...</span>
</div>
<div class="sub" id="subtitle">Загрузка...</div>
<div class="tabs">
  <button class="tab on" onclick="sw('pl',this)">P&L</button>
  <button class="tab" onclick="sw('sales',this)">Продажи</button>
  <button class="tab" onclick="sw('exp',this)">Расходы</button>
  <button class="tab" onclick="sw('stock',this)">Склад</button>
  <select class="yf" id="yf" onchange="render()">
    <option value="ALL">Все годы</option>
    <option value="2021">2021</option><option value="2022">2022</option>
    <option value="2023">2023</option><option value="2024">2024</option><option value="2025">2025</option>
  </select>
</div>
<div id="ld" class="ld"><h2>Загрузка данных из Google Sheets...</h2><p>Подключение к BW_Looker_Data</p></div>
<div id="t-pl" class="hidden"></div>
<div id="t-sales" class="hidden"></div>
<div id="t-exp" class="hidden"></div>
<div id="t-stock" class="hidden"></div>

<script>
const SID="1K52LGIjxaQg1LfmjdVKXA0-wMh0MVUo16q-Z6BiNOsQ";
let T=[],SK=[],BL=[],CH={};

function pn(s){
  if(!s||s==="")return 0;
  s=String(s).trim();
  let neg=false;
  if(s.startsWith("(")&&s.endsWith(")")){neg=true;s=s.slice(1,-1);}
  if(s.startsWith("-")){neg=true;s=s.slice(1);}
  s=s.replace(/[₴$€\s]/g,"").replace(/,/g,"");
  let n=parseFloat(s);
  if(isNaN(n))return 0;
  return neg?-n:n;
}

const fm=n=>{if(!n&&n!==0)return"—";const a=Math.abs(n);if(a>=1e6)return(n/1e6).toFixed(1)+"M";if(a>=1e3)return(n/1e3).toFixed(0)+"K";return n.toFixed(0)};
const ff=n=>n?new Intl.NumberFormat("uk-UA",{maximumFractionDigits:0}).format(n):"0";

async function csv(sh){
  const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sh)}`);
  const t=await r.text();const rows=[];let c=[],q=false,f="";
  for(let i=0;i<t.length;i++){const x=t[i];
    if(q){if(x==='"'&&t[i+1]==='"'){f+='"';i++}else if(x==='"')q=false;else f+=x}
    else{if(x==='"')q=true;else if(x===','){c.push(f);f=""}else if(x==='\n'||(x==='\r'&&t[i+1]==='\n')){c.push(f);f="";rows.push(c);c=[];if(x==='\r')i++}else f+=x}}
  if(f||c.length){c.push(f);rows.push(c)}
  if(rows.length<2)return[];const h=rows[0];
  return rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>{o[k.trim()]=r[i]!==undefined?r[i].trim():""});return o})
}

async function load(){
  try{
    const[t,s,b]=await Promise.all([csv("1_Transactions"),csv("3_Stock"),csv("6_Balances")]);
    T=t.map(x=>({...x,amt:pn(x.Amount_UAH),yr:x.Year||"",mo:x.Month||"",tp:x.Type||"",cat:x.Category||"",mgr:x.Manager||"",com:pn(x.Commission)}));
    SK=s;BL=b;
    document.getElementById("status").textContent="● Connected";
    document.getElementById("status").style.color="#10b981";
    document.getElementById("subtitle").textContent=ff(T.length)+" транзакций · Google Sheets";
    document.getElementById("ld").classList.add("hidden");
    render();
  }catch(e){
    document.getElementById("status").textContent="● Ошибка";document.getElementById("status").style.color="#ef4444";
    document.getElementById("ld").innerHTML=`<h2 style="color:#ef4444">Ошибка загрузки</h2><p>${e.message}</p>`;
  }
}

function sw(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');
  ['pl','sales','exp','stock'].forEach(t=>document.getElementById('t-'+t).classList.add('hidden'));
  document.getElementById('t-'+id).classList.remove('hidden');render();
}

function dc(id){if(CH[id]){CH[id].destroy();delete CH[id]}}

const CHS=["Продаж, Мережі","Продаж, Horeca & Shops","Продаж, Експорт","Доход, ФОП","Продаж, Корп клієнт","Доход, каса БВ","Продаж,  Дістрібʼютор Укр","Продаж, Інтернет магазини"];
const CSH={"Продаж, Мережі":"Сети","Продаж, Horeca & Shops":"HoReCa","Продаж, Експорт":"Экспорт","Доход, ФОП":"ФОП","Продаж, Корп клієнт":"Корп","Доход, каса БВ":"Каса","Продаж,  Дістрібʼютор Укр":"Дистр","Продаж, Інтернет магазини":"Инет"};
const CC=["#e11d48","#8b5cf6","#10b981","#f59e0b","#3b82f6","#ec4899","#14b8a6","#6366f1"];
const CO={responsive:true,plugins:{legend:{labels:{color:"#7d8196",font:{size:10},boxWidth:10,padding:8}}},scales:{x:{ticks:{color:"#7d8196",font:{size:10}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:10},callback:v=>fm(v)},grid:{color:"#1e2130"}}}};

function render(){rPL();rSales();rExp();rStock()}

function rPL(){
  const el=document.getElementById("t-pl");
  const yrs=["2021","2022","2023","2024","2025"];
  const d=yrs.map(y=>{const yt=T.filter(t=>t.yr===y);const rev=yt.filter(t=>t.tp==="Доход").reduce((s,t)=>s+t.amt,0);const exp=yt.filter(t=>t.tp==="Расход").reduce((s,t)=>s+t.amt,0);return{y,rev,exp:Math.abs(exp),pr:rev+exp}});
  const r25=d[4].rev,r24=d[3].rev,p25=d[4].pr,gr=r24?((r25-r24)/r24*100).toFixed(1):0,mg=r25?(p25/r25*100).toFixed(1):0;
  const tr=d.reduce((s,x)=>s+x.rev,0),te=d.reduce((s,x)=>s+x.exp,0);
  const uah=BL.find(b=>(b["Валюта"]||b.Currency||"")==="UAH"),eur=BL.find(b=>(b["Валюта"]||b.Currency||"")==="EUR"),usd=BL.find(b=>(b["Валюта"]||b.Currency||"")==="USD");

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Выручка 2025</div><div class="v" style="color:#10b981">${fm(r25)} ₴</div><div class="s">${gr>0?"+":""}${gr}% vs 2024</div></div>
      <div class="kpi"><div class="l">Прибыль 2025</div><div class="v" style="color:${p25>0?'#10b981':'#ef4444'}">${fm(p25)} ₴</div><div class="s">Маржа ${mg}%</div></div>
      <div class="kpi"><div class="l">Всего 2021-25</div><div class="v">${fm(tr)} ₴</div><div class="s">Расходы: ${fm(te)} ₴</div></div>
      <div class="kpi"><div class="l">Баланс</div><div class="v" style="color:#f59e0b">${uah?ff(pn(uah["Баланс"]||uah.Balance||0)):"—"} ₴</div><div class="s">${eur?"€"+ff(pn(eur["Баланс"]||eur.Balance||0)):""} · ${usd?"$"+ff(pn(usd["Баланс"]||usd.Balance||0)):""}</div></div>
    </div>
    <div class="cc"><h3>Выручка · Расходы · Прибыль</h3><canvas id="c1" height="120"></canvas></div>
    <div class="cc"><h3>Выручка помесячно</h3><canvas id="c2" height="80"></canvas></div>`;

  dc("c1");CH.c1=new Chart(document.getElementById("c1"),{type:"bar",data:{labels:yrs,datasets:[
    {label:"Выручка",data:d.map(x=>x.rev),backgroundColor:"#10b981",borderRadius:3},
    {label:"Расходы",data:d.map(x=>x.exp),backgroundColor:"rgba(239,68,68,.6)",borderRadius:3},
    {label:"Прибыль",data:d.map(x=>x.pr),backgroundColor:"#8b5cf6",borderRadius:3}
  ]},options:CO});

  const bm={};T.filter(t=>t.tp==="Доход"&&t.mo>="2021").forEach(t=>{bm[t.mo]=(bm[t.mo]||0)+t.amt});
  const ms=Object.keys(bm).sort();
  dc("c2");CH.c2=new Chart(document.getElementById("c2"),{type:"line",data:{labels:ms,datasets:[{data:ms.map(m=>bm[m]),borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.08)",fill:true,tension:.3,pointRadius:0,borderWidth:1.5}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#7d8196",maxTicksLimit:10,font:{size:9}},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}}}}});
}

function rSales(){
  const el=document.getElementById("t-sales");const yr=document.getElementById("yf").value;
  const pyr=yr==="ALL"?"2025":yr;
  const ft=T.filter(t=>t.tp==="Доход"&&(yr==="ALL"||t.yr===yr));
  const pd=CHS.map((c,i)=>({n:CSH[c]||c,v:ft.filter(t=>t.cat.includes(c.substring(0,15))).reduce((s,t)=>s+t.amt,0)})).filter(x=>x.v>5000);
  const bm={};ft.forEach(t=>{if(!t.mgr||t.mgr==="-"||t.mgr==="=")return;if(!bm[t.mgr])bm[t.mgr]={s:0,c:0};bm[t.mgr].s+=t.amt;bm[t.mgr].c+=t.com});
  const ms=Object.entries(bm).map(([n,d])=>({n,...d})).sort((a,b)=>b.s-a.s).slice(0,5);

  el.innerHTML=`<div class="row">
    <div class="cc"><h3>Каналы ${yr!=="ALL"?yr:"2025"}</h3><canvas id="c3" height="180"></canvas></div>
    <div class="cc"><h3>Менеджеры</h3>${ms.map(m=>`<div class="mg"><div><div class="n">${m.n}</div><div class="s">КМ: ${m.s?(m.c/m.s*100).toFixed(1):0}%</div></div><div><div class="v">${ff(m.s)} ₴</div><div class="s">${ff(m.c)} ₴</div></div></div>`).join("")}</div>
  </div>`;

  dc("c3");CH.c3=new Chart(document.getElementById("c3"),{type:"doughnut",data:{labels:pd.map(x=>x.n),datasets:[{data:pd.map(x=>x.v),backgroundColor:CC.slice(0,pd.length),borderWidth:0}]},
    options:{responsive:true,cutout:"55%",plugins:{legend:{position:"bottom",labels:{color:"#7d8196",font:{size:9},boxWidth:8,padding:6}},tooltip:{callbacks:{label:c=>c.label+": "+ff(c.raw)+" ₴"}}}}});
}

function rExp(){
  const el=document.getElementById("t-exp");const yr=document.getElementById("yf").value;
  const ft=yr==="ALL"?T.filter(t=>t.tp==="Расход"):T.filter(t=>t.tp==="Расход"&&t.yr===yr);
  const bc={};ft.forEach(t=>{const c=t.cat||"???";bc[c]=(bc[c]||0)+t.amt});
  const so=Object.entries(bc).map(([c,v])=>({c,a:v})).sort((a,b)=>a.a-b.a).slice(0,15);

  el.innerHTML=`
    <div class="cc"><h3>Топ расходов ${yr!=="ALL"?yr:""}</h3><canvas id="c4" height="${Math.max(140,so.length*16)}"></canvas></div>
    <div class="cc"><h3>Детализация</h3>${so.map(e=>`<div class="er"><span class="c">${e.c}</span><span class="a">${ff(Math.abs(e.a))} ₴</span></div>`).join("")}</div>`;

  dc("c4");CH.c4=new Chart(document.getElementById("c4"),{type:"bar",data:{labels:so.map(e=>e.c.substring(0,22)),datasets:[{data:so.map(e=>Math.abs(e.a)),backgroundColor:"rgba(239,68,68,.55)",borderRadius:2}]},
    options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>ff(c.raw)+" ₴"}}},scales:{x:{ticks:{color:"#7d8196",font:{size:9},callback:v=>fm(v)},grid:{color:"#1e2130"}},y:{ticks:{color:"#7d8196",font:{size:9}},grid:{display:false}}}}});
}

function rStock(){
  const el=document.getElementById("t-stock");
  const it=SK.map(s=>({w:s["Вино"]||"",vi:s["Урожай"]||"",st:pn(s["Остаток"]),so:pn(s["Продано"]),av:pn(s["Сред/мес"]),
    mo:s["Запас мес"]&&s["Запас мес"]!=="N/A"?parseFloat(s["Запас мес"]):null})).filter(s=>s.st>0);
  it.sort((a,b)=>{if(a.mo===null)return 1;if(b.mo===null)return-1;return a.mo-b.mo});
  const tb=it.reduce((s,i)=>s+i.st,0),lo=it.filter(i=>i.mo!==null&&i.mo<3).length,sk=it.filter(i=>i.mo!==null&&i.mo>15).length;

  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="l">Позиций</div><div class="v">${it.length}</div></div>
      <div class="kpi"><div class="l">Бутылок</div><div class="v">${ff(tb)}</div></div>
      <div class="kpi"><div class="l">Заканчив.</div><div class="v" style="color:#ef4444">${lo}</div><div class="s">&lt;3 мес</div></div>
      <div class="kpi"><div class="l">Застряли</div><div class="v" style="color:#f59e0b">${sk}</div><div class="s">&gt;15 мес</div></div>
    </div>
    <div class="lgd"><span><i style="background:#ef4444"></i>Заканч.</span><span><i style="background:#f59e0b"></i>Застряло</span><span><i style="background:#10b981"></i>Норма</span></div>
    ${it.map(i=>{const t=i.st+i.so,p=t>0?(i.st/t*100):0;const cl=i.mo!==null&&i.mo<3?"low":i.mo!==null&&i.mo>15?"stk":"";
      const co=cl==="low"?"#ef4444":cl==="stk"?"#f59e0b":"#10b981";
      return`<div class="si ${cl}"><div class="top"><span class="nm">${i.w} ${i.vi}</span><span style="color:${co};font-weight:600">${ff(i.st)} · ${i.mo!==null?i.mo.toFixed(1)+"м":"N/A"}</span></div><div class="bar"><div class="bf" style="width:${p}%;background:${co}"></div></div><div class="bot"><span>Продано: ${ff(i.so)}</span><span>~${i.av}/мес</span></div></div>`}).join("")}`;
}

load();
</script>
</body>
</html>
